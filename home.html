        // --- GLOBAL SOUND CONTROLLER ---
        window.soundEnabled = true;
        window.musicEnabled = true;
        let audioCtx = null;

        const initAudio = () => {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, duration, vol) => {
            if (!window.soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const playClick = () => playTone(600, 'sine', 0.1, 0.1);
        const playSuccess = () => { playTone(400, 'square', 0.1, 0.1); setTimeout(() => playTone(600, 'square', 0.2, 0.1), 100); };

            Help: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>,
            Star: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" /></svg>,
            Users: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" /></svg>
        };

        // Reusable Password Prompt Modal
        function PasswordPromptModal({ isOpen, onClose, onSuccess, correctPassword, title = "Enter Login Password" }) {
            const [pwd, setPwd] = useState("");
            
            useEffect(() => {
                if (isOpen) setPwd("");
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="bg-cardBg w-full max-w-sm rounded-2xl border border-gray-700 p-5 shadow-2xl relative">
                        <h3 className="text-yellow-500 font-bold text-lg mb-4 text-center">{title}</h3>
                        <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} placeholder="Enter your login password" className="w-full bg-cardLight p-3 rounded-xl border border-gray-600 text-white outline-none mb-4 focus:border-yellow-500 transition-colors" />
                        <div className="flex gap-3">
                            <SoundBtn onClick={onClose} className="flex-1 py-2.5 rounded-xl bg-gray-700 text-white font-bold transition-transform active:scale-95">Cancel</SoundBtn>
                            <SoundBtn onClick={() => {
                                if (pwd === correctPassword) {
                                    onSuccess();
                                    onClose();
                                } else {
                                    alert("Incorrect password!");
                                }
                            }} className="flex-1 py-2.5 rounded-xl bg-gradient-to-b from-yellow-400 to-yellow-600 text-black font-bold shadow-md transition-transform active:scale-95">Confirm</SoundBtn>
                        </div>
                    </motion.div>
                </div>
            );
        }

        const maskString = (str) => {
            if (!str) return "";
            const s = String(str);
            if (s.length <= 3) return "***";
            return "*".repeat(s.length - 3) + s.slice(-3);
        };

        // --- Reusable Tips Modal ---
        function TipsModal({ isOpen, message, onCancel, onConfirm, cancelText = "Cancel", confirmText = "Confirm" }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-xs bg-gradient-to-b from-gray-200 to-gray-400 rounded-2xl p-1 shadow-2xl relative">
                        <div className="bg-[#1E1C24] rounded-xl flex flex-col relative overflow-hidden h-full border border-gray-600">
                            <div className="text-center py-3 font-bold text-white bg-cardBg border-b border-gray-700 text-lg shadow-sm">
                                <Icons.Help className="inline-block w-5 h-5 mr-2" /> Tips
                            </div>
                            <div className="p-5 flex-1 bg-cardBg">
                                <div className="bg-cardLight rounded-xl p-6 text-center text-sm font-semibold text-gray-200 shadow-inner border border-gray-700 min-h-[100px] flex items-center justify-center">
                                    {message}
                                </div>
                            </div>
                            <div className="p-4 flex gap-4 justify-center bg-cardBg border-t border-gray-700">
                                {onCancel && (
                                    <SoundBtn onClick={onCancel} className="flex-1 bg-gradient-to-b from-red-500 to-red-700 text-white font-bold py-2.5 rounded-full border border-red-400 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.5),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 transition-transform text-sm">
                                        {cancelText}
                                    </SoundBtn>
                                )}
                                {onConfirm && (
                                    <SoundBtn onClick={onConfirm} className="flex-1 bg-gradient-to-b from-yellow-400 to-orange-500 text-black font-black py-2.5 rounded-full border border-yellow-200 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.5),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 transition-transform text-sm tracking-wide">
                                        {confirmText}
                                    </SoundBtn>
                                )}
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        }

        // --- Main App Component ---
        function INRClubApp() {
            const [phone, setPhone] = useState(localStorage.getItem('inr_club_active_phone') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('inr_club_active_phone'));
            const [currentTab, setCurrentTab] = useState('home');
            const [activePopup, setActivePopup] = useState(null);
            const [fullScreenPage, setFullScreenPage] = useState(null);
            const [showFirstDeposit, setShowFirstDeposit] = useState(false);

            const [userPassword, setUserPassword] = useState("");
            const [balance, setBalance] = useState(0);
            const [depositedAmount, setDepositedAmount] = useState(0);
            const [history, setHistory] = useState({ deposits: [], withdrawals: [], games: {} });
            const [gamesList, setGamesList] = useState({});
            const [hasRedeemedCode, setHasRedeemedCode] = useState(false);

            const [wagerReq, setWagerReq] = useState(0);
            const [hasWithdrawn, setHasWithdrawn] = useState(false);

            const [savedBank, setSavedBank] = useState(null);
            const [savedUpi, setSavedUpi] = useState(null);

            const [indicators, setIndicators] = useState({ sidebar: true });
            const [toast, setToast] = useState(null);

            const bgmRef = useRef(null);

            const [inboxMsgs, setInboxMsgs] = useState([]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2500);
            };

            // Heartbeat
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const heartbeatInterval = setInterval(() => {
                    database.ref(`users/${phone}`).update({ lastActive: Date.now() });
                }, 30000);
                return () => clearInterval(heartbeatInterval);
            }, [phone, isLoggedIn]);

            // Real-time Firebase Sync & Daily Bonus Auto-Generation
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const userRef = database.ref('users/' + phone);
                
                const handleValue = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (data.blocked === true) {
                            alert("Your account has been blocked by the admin.");
                            handleLogout();
                            return;
                        }

                        let currentBal = Number(data.balance || 0);
                        let currentDep = Number(data.depositedAmount || 0);
                        let currentHistory = data.history || { deposits: [], withdrawals: [], games: {} };
                        let needUpdate = false;
                        let toastMsg = "";

                        // Fetch User Password for Verification Modals
                        if (data.password) {
                            setUserPassword(data.password);
                        }

                        // AUTO CREDIT LOGIC
                        if (currentHistory.deposits) {
                            currentHistory.deposits = currentHistory.deposits.map(dep => {
                                const status = dep.status ? dep.status.toLowerCase() : '';
                                if ((status === 'complete' || status === 'succeed') && !dep.credited) {
                                    needUpdate = true;
                                    const bonusPercent = currentDep === 0 ? 0.08 : 0.05;
                                    const bonus = parseFloat((dep.amount * bonusPercent).toFixed(2));
                                    currentBal += (dep.amount + bonus);
                                    currentDep += dep.amount;
                                    toastMsg = `Deposit Successful! ₹${(dep.amount + bonus).toFixed(2)} added (with bonus).`;
                                    return { ...dep, credited: true, bonusAdded: bonus };
                                }
                                return dep;
                            });
                        }

                        // --- 12-HOUR DAILY INBOX BONUS LOGIC ---
                        const TWELVE_HOURS = 12 * 60 * 60 * 1000;
                        const now = Date.now();
                        let lastBonus = data.lastDailyBonusTime;
                        
                        if (!lastBonus) {
                            lastBonus = data.createdAt || now; 
                        }

                        if (now - lastBonus >= TWELVE_HOURS) {
                            const newBonusMsg = {
                                id: 'daily_' + now,
                                type: 'daily_bonus',
                                title: '🎁 12-Hour Daily Bonus',
                                content: 'Your recurring 12-hour free bonus is ready! Claim it now.',
                                amount: -1, 
                                date: new Date().toLocaleString(),
                                claimed: false,
                                timestamp: now
                            };
                            
                            if (!data.inboxMsgs) data.inboxMsgs = [];
                            data.inboxMsgs.push(newBonusMsg);
                            data.lastDailyBonusTime = now;
                            needUpdate = true;
                        }

                        if (needUpdate) {
                            userRef.update({
                                balance: parseFloat(currentBal.toFixed(2)),
                                depositedAmount: parseFloat(currentDep.toFixed(2)),
                                history: currentHistory,
                                inboxMsgs: data.inboxMsgs || [],
                                lastDailyBonusTime: data.lastDailyBonusTime || now
                            }).then(() => {
                                if (toastMsg) showToast(toastMsg);
                            });
                            return; 
                        }

                        // Set States safely
                        setBalance(currentBal);
                        setDepositedAmount(currentDep);
                        setHistory(currentHistory);
                        if (typeof data.wagerReq !== 'undefined') setWagerReq(Number(data.wagerReq));
                        if (typeof data.hasRedeemedCode !== 'undefined') setHasRedeemedCode(!!data.hasRedeemedCode);

                        if (data.withdrawalDetails) {
                            if (data.withdrawalDetails.savedBank) setSavedBank(data.withdrawalDetails.savedBank);
                            if (data.withdrawalDetails.savedUpi) setSavedUpi(data.withdrawalDetails.savedUpi);
                        }
                        
                        // --- MERGE INBOX MESSAGES ---
                        let combinedInbox = [];
                        if (data.inboxMsgs) {
                            combinedInbox = [...data.inboxMsgs];
                        }
                        if (data.inbox) {
                            const adminMsgs = Object.values(data.inbox).map(msg => ({
                                id: msg.id,
                                type: 'admin',
                                title: msg.title,
                                content: msg.message,
                                amount: msg.coins,
                                date: msg.date,
                                claimed: msg.claimed,
                                dbKey: msg.id,
                                timestamp: msg.timestamp || new Date(msg.date).getTime() || 0
                            }));
                            combinedInbox = [...combinedInbox, ...adminMsgs];
                        }
                        
                        // Sort Newest First
                        combinedInbox.sort((a, b) => {
                            const timeA = a.timestamp || new Date(a.date).getTime() || 0;
                            const timeB = b.timestamp || new Date(b.date).getTime() || 0;
                            return timeB - timeA;
                        });

                        setInboxMsgs(combinedInbox);
                    }
                };
                userRef.on('value', handleValue);
                return () => userRef.off('value', handleValue);
            }, [phone, isLoggedIn]);

            // Real-time games list listener
            useEffect(() => {
                const gamesRef = database.ref('games');
                gamesRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setGamesList(data);
                });
                return () => gamesRef.off();
            }, []);

            const updateFirebaseUser = (fields) => {
                if (!phone) return;
                database.ref('users/' + phone).update(fields);
            };

            const handleClaimInbox = () => {
                database.ref('system_config').once('value').then(snapConfig => {
                    const config = snapConfig.val() || { minDailyBonus: 5, maxDailyBonus: 15 };
                    const minD = Number(config.minDailyBonus);
                    const maxD = Number(config.maxDailyBonus);

                    let claimedTotal = 0;
                    let updatedLegacyArray = [];
                    let adminUpdates = {};
                    let hasChanges = false;

                    const newMsgs = inboxMsgs.map(m => {
                        let currentM = { ...m };
                        if (!currentM.claimed) {
                            hasChanges = true;
                            currentM.claimed = true;
                            
                            if (currentM.type === 'admin') {
                                adminUpdates[`inbox/${currentM.dbKey}/claimed`] = true;
                            } else if (currentM.amount !== 0) {
                                const dynamicReward = Math.floor(Math.random() * (maxD - minD + 1)) + minD;
                                claimedTotal += dynamicReward;
                                currentM.amount = dynamicReward;
                            }
                        }
                        
                        if (currentM.type !== 'admin') {
                            updatedLegacyArray.push(currentM);
                        }
                        return currentM;
                    });

                    if (!hasChanges) return;

                    const updates = {};
                    updates.inboxMsgs = updatedLegacyArray;
                    if (Object.keys(adminUpdates).length > 0) Object.assign(updates, adminUpdates);

                    if (claimedTotal > 0) {
                        updates.balance = parseFloat((balance + claimedTotal).toFixed(2));
                    }

                    updateFirebaseUser(updates);
                    if (claimedTotal > 0) showToast(`Claimed ₹${claimedTotal} successfully!`);
                    else showToast(`Inbox marked as read!`);
                });
            };

            const handleClaimPromoCode = (inputCode) => {
                if (!inputCode) {
                    showToast("Please enter a promotion code.");
                    return;
                }
                const cleanCode = inputCode.trim().toUpperCase();
                const promoRef = database.ref(`promocodes/${cleanCode}`);

                promoRef.once('value').then(snapshot => {
                    const promo = snapshot.val();
                    if (!promo) { alert("Invalid Promotion/Voucher Code!"); return; }

                    const todayStr = new Date().toISOString().split('T')[0];
                    if (promo.expiryDate && todayStr > promo.expiryDate) {
                        alert("This promotion has expired!"); return;
                    }
                    if (promo.claimsCount >= promo.maxClaims) {
                        alert("This code's maximum claims limit has been reached!"); return;
                    }
                    if (promo.claims && promo.claims[phone]) {
                        alert("You have already claimed this promotion code!"); return;
                    }

                    const claimRecord = { phone: phone, timestamp: Date.now(), coins: promo.coins };

                    promoRef.child('claims').child(phone).set(claimRecord).then(() => {
                        promoRef.update({ claimsCount: (promo.claimsCount || 0) + 1 });
                        updateFirebaseUser({ balance: parseFloat((balance + promo.coins).toFixed(2)) });
                        showToast(`Success! Claimed ₹${promo.coins} to your balance.`);
                    }).catch(err => alert("Claims verification error: " + err.message));

                }).catch(err => alert("Connection error: " + err.message));
            };

            const unreadInboxCount = inboxMsgs.filter(m => !m.claimed).length;

            useEffect(() => {
                if (isLoggedIn && window.musicEnabled && bgmRef.current) {
                    bgmRef.current.volume = 0.1;
                    bgmRef.current.play().catch(e => console.log("BGM Play prevented:", e));
                } else if (bgmRef.current) {
                    bgmRef.current.pause();
                }
            }, [isLoggedIn, currentTab, fullScreenPage]);

            const handleLogout = () => {
                localStorage.removeItem('inr_club_active_phone');
                setPhone("");
                setIsLoggedIn(false);
                setActivePopup(null);
                setFullScreenPage(null);
                setUserPassword("");
            };

            const allGames = Object.values(gamesList);
            const primaryGames = allGames.filter(g => g.special).slice(0, 4);
            const secondaryGames = allGames.filter(g => !g.special);

            if (!isLoggedIn) {
                return <AuthView onLogin={(userPhone, userData) => {
                    initAudio(); playSuccess();
                    setPhone(userPhone); setIsLoggedIn(true); setShowFirstDeposit(true);
                    if (userData && userData.password) setUserPassword(userData.password);
                }} />;
            }

            if (fullScreenPage === 'withdraw') {
                return (
                    <WithdrawView
                        onBack={() => setFullScreenPage(null)}
                        balance={balance} showToast={showToast}
                        onShowHistory={() => setFullScreenPage('transactions')}
                        wagerReq={wagerReq} hasWithdrawn={hasWithdrawn}
                        savedBank={savedBank} setSavedBank={(data) => { setSavedBank(data); database.ref(`users/${phone}/withdrawalDetails/savedBank`).set(data); }}
                        savedUpi={savedUpi} setSavedUpi={(data) => { setSavedUpi(data); database.ref(`users/${phone}/withdrawalDetails/savedUpi`).set(data); }}
                        phone={phone}
                        userPassword={userPassword}
                        onSuccess={(amt, method) => {
                            const finalAmt = parseFloat(amt.toFixed(2));
                            const nextBal = parseFloat((balance - finalAmt).toFixed(2));
                            const nextHist = {
                                ...history,
                                withdrawals: [{
                                    id: Date.now(), amount: finalAmt, method: method, status: 'processing', date: new Date().toLocaleString()
                                }, ...(history.withdrawals || [])]
                            };
                            updateFirebaseUser({ balance: nextBal, history: nextHist });
                            setHasWithdrawn(true); setFullScreenPage('transactions');
                        }}
                    />
                );
            }

            if (fullScreenPage === 'transactions') {
                return <TransactionsView onBack={() => setFullScreenPage(null)} history={history} showToast={showToast} />;
            }

            if (fullScreenPage === 'manage_payments') {
                return (
                    <ManagePaymentsView
                        onBack={() => setFullScreenPage(null)}
                        savedBank={savedBank} savedUpi={savedUpi}
                        setSavedBank={(data) => { setSavedBank(data); database.ref(`users/${phone}/withdrawalDetails/savedBank`).set(data); }}
                        setSavedUpi={(data) => { setSavedUpi(data); database.ref(`users/${phone}/withdrawalDetails/savedUpi`).set(data); }}
                        showToast={showToast}
                        userPassword={userPassword}
                    />
                );
            }

            if (currentTab === 'refer') {
                return <ReferView phone={phone} balance={balance} hasRedeemedCode={hasRedeemedCode} updateFirebaseUser={updateFirebaseUser} showToast={showToast} onClose={() => setCurrentTab('home')} />;
            }

            return (
                <div className="w-full h-full flex flex-col text-white relative">
                    <audio ref={bgmRef} loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

                    <AnimatePresence>
                        {toast && (
                            <motion.div initial={{ y: -50, opacity: 0 }} animate={{ y: 20, opacity: 1 }} exit={{ y: -50, opacity: 0 }} className="absolute top-0 left-0 right-0 z-[100] flex justify-center pointer-events-none">
                                <div className="bg-green-600 text-white px-6 py-2 rounded-full shadow-lg font-bold flex items-center gap-2 border border-green-400">
                                    <Icons.Check className="w-5 h-5" /> {toast}
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <TopBar openModal={setActivePopup} balance={balance} handleDepositRedirect={() => window.location.href='deposit.html'} indicators={indicators} setIndicators={setIndicators} unreadInboxCount={unreadInboxCount} />

                    <div className="absolute top-[30%] right-0 z-40 bg-gradient-to-l from-[#EAB308] to-orange-500 pl-3 pr-1 py-4 rounded-l-2xl cursor-pointer shadow-gold animate-pulse-side border-y border-l border-white/20 flex items-center justify-center"
                        onClick={() => { playClick(); setIndicators(p => ({ ...p, sidebar: false })); setActivePopup('side_menu'); }}>
                        <Icons.Menu className="w-6 h-6 text-black" />
                        {indicators.sidebar && <div className="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-[#16131F] shadow"></div>}
                    </div>

                    <div className="flex-1 overflow-y-auto pb-20 relative scroll-smooth bg-appBg w-full">
                        <AnimatePresence mode="wait">
                            <motion.div key={currentTab} initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 10 }} transition={{ duration: 0.2 }} className="min-h-full">
                                {currentTab === 'home' && <HomeView openModal={setActivePopup} primaryGames={primaryGames} secondaryGames={secondaryGames} />}
                                {currentTab === 'bank' && <BankView setFullScreenPage={setFullScreenPage} balance={balance} showToast={showToast} />}
                                {currentTab === 'wheel' && <WheelView handleDepositRedirect={() => window.location.href='deposit.html'} depositedAmount={depositedAmount} showToast={showToast} updateFirebaseUser={updateFirebaseUser} activePhone={phone} />}
                            </motion.div>
                        </AnimatePresence>
                    </div>

                    <BottomNav currentTab={currentTab} setCurrentTab={setCurrentTab} />

                    <AnimatePresence>
                        {showFirstDeposit && <FirstDepositModal onClose={() => setShowFirstDeposit(false)} onAddCash={() => { setShowFirstDeposit(false); window.location.href='deposit.html'; }} />}
                        {activePopup === 'profile' && <ProfileModal onClose={() => setActivePopup(null)} onLogout={handleLogout} openModal={setActivePopup} phone={phone} />}
                        {activePopup === 'inbox' && <InboxModal onClose={() => setActivePopup(null)} msgs={inboxMsgs} onClaimAll={handleClaimInbox} setMsgs={(updatedMsgs) => updateFirebaseUser({ inboxMsgs: updatedMsgs })} />}
                        {activePopup === 'settings' && <SettingsModal onClose={() => setActivePopup(null)} openModal={setActivePopup} />}
                        {activePopup === 'side_menu' && <SideMenuModal onClose={() => setActivePopup(null)} openModal={setActivePopup} />}
                        {activePopup === 'promo_code' && <PromoCodeModal onClose={() => setActivePopup(null)} onClaimPromoCode={handleClaimPromoCode} />}
                        {activePopup === 'invite_chest' && <InviteChestModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'rewards_today' && <RewardsTodayModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'attendance' && <AttendanceModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'bind_phone' && <BindPhoneModal onClose={() => setActivePopup(null)} showToast={showToast} />}
                        {activePopup === 'exit_confirm' && <TipsModal isOpen={true} message="Are you sure you want to exit INR CLUB?" onCancel={() => setActivePopup(null)} onConfirm={() => { setActivePopup(null); setCurrentTab('home'); }} cancelText="NO" confirmText="YES" />}
                    </AnimatePresence>
                </div>
            );
        }

        /* ================= NEW AUTH / LOGIN / REGISTER VIEW ================= */
        function AuthView({ onLogin }) {
            const [isLoginView, setIsLoginView] = useState(true);
            const [phoneNum, setPhoneNum] = useState("");
            const [password, setPassword] = useState("");
            const [holderName, setHolderName] = useState("");
            const [inviteCode, setInviteCode] = useState("");
            const [isCodeLocked, setIsCodeLocked] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                if (code) {
                    setInviteCode(code);
                    setIsCodeLocked(true);
                    setIsLoginView(false);
                }
            }, []);

            const handleAuthSubmit = () => {
                if (!phoneNum || phoneNum.length < 10) { alert("Please enter a valid 10-digit mobile number."); return; }
                if (!password || password.length < 4) { alert("Password must be at least 4 characters."); return; }

                setIsSubmitting(true);
                const userRef = database.ref('users/' + phoneNum);
                
                if (isLoginView) {
                    userRef.once('value').then(snapshot => {
                        const userData = snapshot.val();
                        if (userData) {
                            if (userData.password === password) {
                                localStorage.setItem('inr_club_active_phone', phoneNum);
                                onLogin(phoneNum, userData);
                            } else {

            const [timeFilter, setTimeFilter] = useState('all');

            useEffect(() => { setStatusFilter('all'); }, [activeTab]);

            const getFilteredData = () => {
                let list = [];
                if (activeTab === 'deposits') list = history.deposits || [];
                else if (activeTab === 'withdrawals') list = history.withdrawals || [];
                else if (activeTab === 'games') {
                    list = history.games ? Object.values(history.games).sort((a,b) => {
                        const timeA = a.timestamp || new Date(a.date).getTime() || 0;
                        const timeB = b.timestamp || new Date(b.date).getTime() || 0;
                        return timeB - timeA;
                    }) : [];
                }
                else if (activeTab === 'balance') list = [...(history.deposits || []), ...(history.withdrawals || [])];

                return list.filter(item => {
                    const st = item.status ? item.status.toLowerCase() : '';
                    if (statusFilter !== 'all') {
                        if (statusFilter === 'succeed' && st !== 'complete' && st !== 'succeed' && st !== 'win') return false;
                        if (statusFilter === 'pending' && st !== 'processing' && st !== 'pending') return false;
                        if (statusFilter === 'failed' && st !== 'failed' && st !== 'fail' && st !== 'rejected' && st !== 'lose') return false;
                    }
                    if (timeFilter !== 'all') {
                        const days = Number(timeFilter);
                        const limitMs = days * 24 * 60 * 60 * 1000;
                        const itemTime = item.id || item.timestamp || new Date(item.date).getTime() || Date.now();
                        if (Date.now() - itemTime > limitMs) return false;
                    }
                    return true;
                });

            const getStatusStyles = (st) => {
                const s = st ? st.toLowerCase() : '';
                if (s === 'complete' || s === 'succeed' || s === 'win') return 'bg-green-500/20 text-green-400 border border-green-500/30';

        /* ================= WITHDRAW VIEW ================= */
        function WithdrawView({ onBack, balance, showToast, onShowHistory, wagerReq, hasWithdrawn, savedBank, setSavedBank, savedUpi, setSavedUpi, phone, userPassword, onSuccess }) {
            const [wdMethod, setWdMethod] = useState('bank');
            const [amount, setAmount] = useState("");
            const [refreshing, setRefreshing] = useState(false);
            const [dailyWithdrawals, setDailyWithdrawals] = useState(0);
            const [showPwdPrompt, setShowPwdPrompt] = useState(false);

            useEffect(() => {
                if (!phone) return;
                const wdRef = database.ref('users/' + phone + '/dailyWithdrawals');
                wdRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data) {
                        const today = new Date().toDateString();
                        if (data.date === today) { setDailyWithdrawals(data.count || 0); } 
                        else { setDailyWithdrawals(0); database.ref('users/' + phone + '/dailyWithdrawals').set({ date: today, count: 0 }); }
                    } else {
                        const today = new Date().toDateString();
                        database.ref('users/' + phone + '/dailyWithdrawals').set({ date: today, count: 0 });
                        setDailyWithdrawals(0);
                    }
                });
                return () => wdRef.off();
            }, [phone]);

            const handleRefresh = () => { setRefreshing(true); setTimeout(() => { setRefreshing(false); showToast("Amount Refreshed!"); }, 1000); playClick(); };
            const numAmt = Number(amount) || 0;
            const MAX_DAILY_WITHDRAWALS = 3;
            const remainingWithdrawals = Math.max(0, MAX_DAILY_WITHDRAWALS - dailyWithdrawals);

            const handleWithdrawInit = () => {
                if (remainingWithdrawals <= 0) { showToast("Limit reached!"); return; }
                if (wagerReq > 0) { showToast("Complete betting requirement first!"); return; }
                if (!numAmt || numAmt <= 0 || numAmt > balance) { showToast("Invalid amount!"); return; }
                
                // Form Check Before Show Password Prompt
                if (wdMethod === 'bank') {
                    if (!savedBank || !savedBank.acc || String(savedBank.acc).trim() === "") {
                        showToast("Please Save Bank Info first!"); return;
                    }
                }
                if (wdMethod === 'upi') {
                    if (!savedUpi || !savedUpi.upi || String(savedUpi.upi).trim() === "") {
                        showToast("Please Save UPI Info first!"); return;
                    }
                }
                
                setShowPwdPrompt(true);
            };

            const processWithdrawal = () => {
