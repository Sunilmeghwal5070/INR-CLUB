            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, duration, vol) => {
            if (!window.soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

            const [inboxMsgs, setInboxMsgs] = useState([
                { id: 1, type: 'notification', title: 'Daily Reward', content: 'Welcome Reward for joining INR CLUB!', amount: 10, date: new Date().toLocaleString(), claimed: false },
                { id: 2, type: 'notification', title: 'System Notice', content: 'Tap the image to join INR CLUB now — exclusive rewards, daily bonuses & special offers!', amount: 0, date: new Date().toLocaleString(), claimed: false }
            ]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2500);
            };

            // Heartbeat active timestamp update
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const heartbeatInterval = setInterval(() => {
                    database.ref(`users/${phone}`).update({ lastActive: Date.now() });
                }, 30000); // every 30 seconds
                return () => clearInterval(heartbeatInterval);
            }, [phone, isLoggedIn]);

            // Firebase sync
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const userRef = database.ref('users/' + phone);
                const handleValue = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Check if blocked by admin
                        if (data.blocked === true) {
                            alert("Your account has been blocked by the admin.");
                            handleLogout();
                            return;
                        }

                        if (typeof data.balance !== 'undefined') setBalance(Number(data.balance));
                        if (typeof data.depositedAmount !== 'undefined') setDepositedAmount(Number(data.depositedAmount));
                        if (typeof data.wagerReq !== 'undefined') setWagerReq(Number(data.wagerReq));
                        if (data.history) setHistory(data.history);
                        if (data.inboxMsgs) setInboxMsgs(data.inboxMsgs);
                        
                        // Sync withdrawalDetails persistently from Firebase
                        if (data.withdrawalDetails) {
                            if (data.withdrawalDetails.savedBank) setSavedBank(data.withdrawalDetails.savedBank);
                            if (data.withdrawalDetails.savedUpi) setSavedUpi(data.withdrawalDetails.savedUpi);
                        }
                    }
                };
                userRef.on('value', handleValue);
                return () => userRef.off('value', handleValue);
            }, [phone, isLoggedIn]);

            // Real-time games list listener
            useEffect(() => {
                const gamesRef = database.ref('games');
                gamesRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setGamesList(data);
                });
                return () => gamesRef.off();
            }, []);

            const updateFirebaseUser = (fields) => {
                if (!phone) return;
                database.ref('users/' + phone).update(fields);
            };

            // Dynamic Config Daily Reward claim ranges handler
            const handleClaimInbox = () => {
                database.ref('system_config').once('value').then(snapConfig => {
                    const config = snapConfig.val() || { minDailyBonus: 5, maxDailyBonus: 15 };
                    const minD = Number(config.minDailyBonus);
                    const maxD = Number(config.maxDailyBonus);

                    let claimedTotal = 0;
                    const newMsgs = inboxMsgs.map(m => {
                        if (!m.claimed && m.amount > 0) {
                            // Calculate dynamic random login bonus from database range configs
                            const dynamicReward = Math.floor(Math.random() * (maxD - minD + 1)) + minD;
                            claimedTotal += dynamicReward;
                            return { ...m, claimed: true, amount: dynamicReward };
                        }
                        return m;
                    });

                    if (claimedTotal > 0) {
                        const nextBal = parseFloat((balance + claimedTotal).toFixed(2));
                        updateFirebaseUser({
                            balance: nextBal,
                            inboxMsgs: newMsgs
                        });
                        showToast(`Claimed ₹${claimedTotal} successfully!`);
                    }
                });
            };

            // Dynamic Promo Code and Voucher Claiming Engine
            const handleClaimPromoCode = (inputCode) => {
                if (!inputCode) {
                    showToast("Please enter a promotion code.");
                    return;
                }
                const cleanCode = inputCode.trim().toUpperCase();
                const promoRef = database.ref(`promocodes/${cleanCode}`);

                promoRef.once('value').then(snapshot => {
                    const promo = snapshot.val();
                    if (!promo) {
                        alert("Invalid Promotion/Voucher Code!");
                        return;
                    }

                    // Expiry Date check
                    const todayStr = new Date().toISOString().split('T')[0]; // "YYYY-MM-DD"
                    if (promo.expiryDate && todayStr > promo.expiryDate) {
                        alert("This promotion has expired!");
                        return;
                    }

                    // Claims Limit check
                    if (promo.claimsCount >= promo.maxClaims) {
                        alert("This code's maximum claims limit has been reached!");
                        return;
                    }

                    // Already Claimed check
                    if (promo.claims && promo.claims[phone]) {
                        alert("You have already claimed this promotion code!");
                        return;
                    }

                    // Write claim audits
                    const claimRecord = {
                        phone: phone,
                        timestamp: Date.now(),
                        coins: promo.coins
                    };

                    promoRef.child('claims').child(phone).set(claimRecord).then(() => {
                        // Increment claims count
                        const nextCount = (promo.claimsCount || 0) + 1;
                        promoRef.update({ claimsCount: nextCount });

                        // Add coins value to balance
                        const nextBal = parseFloat((balance + promo.coins).toFixed(2));
                        updateFirebaseUser({ balance: nextBal });

                        showToast(`Success! Claimed ₹${promo.coins} to your balance.`);
                    }).catch(err => alert("Claims verification error: " + err.message));

                }).catch(err => alert("Connection error: " + err.message));
            };

            const unreadInboxCount = inboxMsgs.filter(m => !m.claimed && m.amount > 0).length;

            useEffect(() => {
                if(isLoggedIn && window.musicEnabled && bgmRef.current) {
                    bgmRef.current.volume = 0.2;
                    bgmRef.current.play().catch(e => console.log("BGM Play prevented:", e));
                } else if(bgmRef.current) {
                    bgmRef.current.pause();
                }
            }, [isLoggedIn, currentTab, fullScreenPage]); 

            const handleLogout = () => {
                localStorage.removeItem('inr_club_active_phone');
                setPhone("");
                setIsLoggedIn(false);
                setActivePopup(null);
                setFullScreenPage(null);
            };

            const handleRedirectToDeposit = () => {
                window.location.href = 'deposit.html';
            };

            const handleBackFromWithdraw = () => {
                setFullScreenPage(null);
            };

            // Dynamic filter categorizer for Primary and Secondary games List
            const allGames = Object.values(gamesList);
            const primaryGames = allGames.filter(g => g.special).slice(0, 4);
            const secondaryGames = allGames.filter(g => !g.special);

            if (!isLoggedIn) {
                return <AuthView onLogin={(userPhone) => {
                    initAudio(); 
                    playSuccess();
                    setPhone(userPhone);
                    setIsLoggedIn(true);
                    setShowFirstDeposit(true);
                }} />;
            }

            if (fullScreenPage === 'withdraw') {
                return (
                    <WithdrawView 
                        onBack={handleBackFromWithdraw} 
                        balance={balance} 
                        showToast={showToast} 
                        onShowHistory={() => setFullScreenPage('withdraw_history')} 
                        wagerReq={wagerReq} 
                        hasWithdrawn={hasWithdrawn} 
                        savedBank={savedBank}
                        setSavedBank={(bankData) => {
                            setSavedBank(bankData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedBank').set(bankData);
                        }}
                        savedUpi={savedUpi}
                        setSavedUpi={(upiData) => {
                            setSavedUpi(upiData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedUpi').set(upiData);
                        }}
                        onSuccess={(amt, method) => { 
                            const finalAmt = parseFloat(amt.toFixed(2));
                            const nextBal = parseFloat((balance - finalAmt).toFixed(2));
                            const nextHist = {
                                ...history,
                                withdrawals: [{ 
                                    id: Date.now(), 
                                    amount: finalAmt, 
                                    method: method,
                                    status: 'processing', 
                                    date: new Date().toLocaleString() 
                                }, ...(history.withdrawals || [])]
                            };
                            updateFirebaseUser({
                                balance: nextBal,
                                history: nextHist
                            });
                            setHasWithdrawn(true); 
                            setFullScreenPage('withdraw_history'); 
                        }} 
                    />
                );
            }

            if (fullScreenPage === 'withdraw_history') return <HistoryView onBack={() => setFullScreenPage('withdraw')} type="withdraw" history={history} />;

            if (currentTab === 'refer') {
                return <ReferView onClose={() => setCurrentTab('home')} />;
            }

            return (
                <div className="w-full h-full flex flex-col text-white relative">
                    <audio ref={bgmRef} loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
                    
                    {/* TOAST NOTIFICATION */}
                    <AnimatePresence>
                        {toast && (
                            <motion.div initial={{ y: -50, opacity: 0 }} animate={{ y: 20, opacity: 1 }} exit={{ y: -50, opacity: 0 }} className="absolute top-0 left-0 right-0 z-[100] flex justify-center pointer-events-none">
                                <div className="bg-green-600 text-white px-6 py-2 rounded-full shadow-lg font-bold flex items-center gap-2 border border-green-400">
                                    <Icons.Check /> {toast}
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <TopBar openModal={setActivePopup} balance={balance} handleDepositRedirect={handleRedirectToDeposit} indicators={indicators} setIndicators={setIndicators} unreadInboxCount={unreadInboxCount} />

                    <div className="absolute top-[30%] right-0 z-40 bg-gradient-to-l from-[#EAB308] to-orange-500 pl-3 pr-1 py-4 rounded-l-2xl cursor-pointer shadow-gold animate-pulse-side border-y border-l border-white/20 flex items-center justify-center" 
                         onClick={() => { playClick(); setIndicators(p=>({...p, sidebar: false})); setActivePopup('side_menu'); }}>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        {indicators.sidebar && <div className="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-[#16131F] shadow"></div>}
                    </div>

                    <div className="flex-1 overflow-y-auto pb-20 relative scroll-smooth bg-appBg w-full">
                        <AnimatePresence mode="wait">
                            <motion.div key={currentTab} initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 10 }} transition={{ duration: 0.2 }} className="min-h-full">
                                {currentTab === 'home' && <HomeView openModal={setActivePopup} primaryGames={primaryGames} secondaryGames={secondaryGames} />}
                                {currentTab === 'bank' && <BankView setFullScreenPage={setFullScreenPage} balance={balance} showToast={showToast} />}
                                {currentTab === 'wheel' && <WheelView handleDepositRedirect={handleRedirectToDeposit} depositedAmount={depositedAmount} showToast={showToast} updateFirebaseUser={updateFirebaseUser} />}
                            </motion.div>
                        </AnimatePresence>
                    </div>

                    <BottomNav currentTab={currentTab} setCurrentTab={setCurrentTab} />

                    <AnimatePresence>
                        {showFirstDeposit && <FirstDepositModal onClose={() => setShowFirstDeposit(false)} onAddCash={() => { setShowFirstDeposit(false); handleRedirectToDeposit(); }} />}
                        {activePopup === 'profile' && <ProfileModal onClose={() => setActivePopup(null)} onLogout={handleLogout} openModal={setActivePopup} phone={phone} />}
                        {activePopup === 'inbox' && <InboxModal onClose={() => setActivePopup(null)} msgs={inboxMsgs} onClaimAll={handleClaimInbox} setMsgs={(updatedMsgs) => updateFirebaseUser({ inboxMsgs: updatedMsgs })} />}
                        {activePopup === 'settings' && <SettingsModal onClose={() => setActivePopup(null)} openModal={setActivePopup} />}
                        {activePopup === 'side_menu' && <SideMenuModal onClose={() => setActivePopup(null)} openModal={setActivePopup} />}
                        {activePopup === 'promo_code' && <PromoCodeModal onClose={() => setActivePopup(null)} onClaimPromoCode={handleClaimPromoCode} />}
                        {activePopup === 'invite_chest' && <InviteChestModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'rewards_today' && <RewardsTodayModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'attendance' && <AttendanceModal onClose={() => setActivePopup(null)} />}
                        {activePopup === 'bind_phone' && <BindPhoneModal onClose={() => setActivePopup(null)} showToast={showToast} />} 
                        {activePopup === 'exit_confirm' && <TipsModal isOpen={true} message="Are you sure you want to exit INR CLUB?" onCancel={()=>setActivePopup(null)} onConfirm={()=>{setActivePopup(null); setCurrentTab('home');}} cancelText="NO" confirmText="YES" />}
                    </AnimatePresence>
                </div>
            );
        }

        /* ================= AUTH / LOGIN VIEW ================= */
        function AuthView({ onLogin }) {
            const [phoneNum, setPhoneNum] = useState("");
            const [password, setPassword] = useState("");
            const [holderName, setHolderName] = useState("");
            const [otp, setOtp] = useState("");
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleAuthSubmit = () => {
                if (!phoneNum || phoneNum.length < 10) {
                    alert("Please enter a valid 10-digit mobile number.");
                    return;
                }
                if (!password || password.length < 4) {
                    alert("Password must be at least 4 characters.");
                    return;
                }

                setIsSubmitting(true);
                const userRef = database.ref('users/' + phoneNum);
                userRef.once('value').then(snapshot => {
                    const userData = snapshot.val();
                    if (userData) {
                        // User exists, handle Login
                        if (userData.password === password) {
                            localStorage.setItem('inr_club_active_phone', phoneNum);
                            onLogin(phoneNum, userData);
                        } else {
                            alert("Incorrect password!");
                            setIsSubmitting(false);
                        }
                    } else {
                        // Registration mode
                        if (!holderName) {
                            alert("Please enter your full holder name to register.");
                            setIsSubmitting(false);
                            return;
                        }

                        // Pull config setup
                        database.ref('system_config').once('value').then(snapConfig => {
                            const config = snapConfig.val() || { minRegBonus: 10, maxRegBonus: 100 };
                            const minB = Number(config.minRegBonus);
                            const maxB = Number(config.maxRegBonus);

                            // Calculate dynamic registration welcome coins from database ranges configs
                            const randomRegBonus = Math.floor(Math.random() * (maxB - minB + 1)) + minB;

                            const newUser = {
                                phone: phoneNum,
                                password: password,
                                holderName: holderName,
                                balance: randomRegBonus, // dynamic calculation!
                                depositedAmount: 0,
                                wagerReq: 0,
                                lastActive: Date.now(),
                                history: { deposits: [], withdrawals: [] },
                                inboxMsgs: [
                                    { id: 1, type: 'notification', title: 'Daily Reward', content: 'Welcome Reward for joining INR CLUB!', amount: 10, date: new Date().toLocaleString(), claimed: false },
                                    { id: 2, type: 'notification', title: 'System Notice', content: 'Welcome to INR CLUB — enjoy premium gaming benefits & rewards!', amount: 0, date: new Date().toLocaleString(), claimed: false }
                                ]
                            };
                            userRef.set(newUser).then(() => {
                                localStorage.setItem('inr_club_active_phone', phoneNum);
                                onLogin(phoneNum, newUser);
                            });
                        });
                    }
                }).catch(err => {
                    alert("Connection error: " + err.message);
                    setIsSubmitting(false);
                });
            };

            return (
                <div className="w-full h-full bg-appBg text-white flex flex-col overflow-y-auto">
                    <div className="flex-1 flex flex-col p-6 relative justify-center">
                        <div className="bg-cardBg rounded-2xl border border-gray-800 flex flex-col items-center pt-8 pb-6 px-5 shadow-2xl mt-8 relative">
                            <div className="absolute -top-12 bg-appBg rounded-full border-4 border-yellow-500 shadow-gold p-2">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sara&backgroundColor=transparent" className="w-16 h-16" />
                            </div>
                            <h3 className="text-white font-black text-sm text-center uppercase mt-4">Bind your mobile number<br/>to get rewards</h3>
                            <div className="mt-2 bg-yellow-500/20 rounded-full px-6 py-1 border border-yellow-500 text-yellow-500 font-bold text-sm shadow-[0_0_10px_rgba(234,179,8,0.3)] mb-6">₹5-100</div>
                            <div className="w-full flex flex-col gap-3">
                                <label className="text-xs font-bold text-gray-400">Mobile Number</label>
                                <div className="bg-cardLight rounded-lg flex items-center px-2 py-3 border border-gray-700 focus-within:border-yellow-500">
                                    <span className="text-white text-sm mr-2 border-r border-gray-600 pr-2">+91</span>
                                    <input type="tel" value={phoneNum} onChange={e=>setPhoneNum(e.target.value)} placeholder="Enter your mobile number" className="bg-transparent w-full outline-none text-white text-sm placeholder-gray-500" />
                                </div>
                                <label className="text-xs font-bold text-gray-400 mt-2">Login Password</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Set your login password" className="bg-cardLight rounded-lg px-3 py-3 border border-gray-700 outline-none text-white text-sm placeholder-gray-500 focus:border-yellow-500" />
                                <label className="text-xs font-bold text-gray-400 mt-2">Holder Name</label>
                                <input type="text" value={holderName} onChange={e=>setHolderName(e.target.value)} placeholder="Enter your full name to withdraw" className="bg-cardLight rounded-lg px-3 py-3 border border-gray-700 outline-none text-white text-sm placeholder-gray-500 focus:border-yellow-500" />
                                <p className="text-[9px] text-red-500 mt-[-4px]">Make sure your name correct, once added can't be changed later</p>
                                <label className="text-xs font-bold text-gray-400 mt-2">OTP</label>
                                <div className="flex gap-2">
                                    <div className="flex-1 bg-cardLight rounded-lg flex items-center px-3 border border-gray-700 focus-within:border-yellow-500">
                                        <Icons.Phone className="w-4 h-4 text-blue-400" />
                                        <span className="text-gray-500 text-xs mx-1">▼</span>
                                        <input type="text" value={otp} onChange={e=>setOtp(e.target.value)} placeholder="Enter OTP" className="bg-transparent w-full outline-none text-white text-sm placeholder-gray-500 pl-2 border-l border-gray-600" />
                                    </div>
                                    <SoundBtn onClick={() => alert("Verification code sent!")} className="bg-yellow-500 text-black font-bold px-5 py-3 rounded-lg shadow border border-yellow-400 active:scale-95">OTP</SoundBtn>
                                </div>
                                <SoundBtn onClick={handleAuthSubmit} disabled={isSubmitting} className="bg-gradient-to-b from-yellow-400 to-yellow-600 text-black font-black py-4 rounded-xl shadow-gold mt-6 w-full text-lg uppercase tracking-widest border border-yellow-300">
                                    {isSubmitting ? "Processing..." : "Confirm & Login"}
                                </SoundBtn>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ================= FIRST DEPOSIT MODAL ================= */
        function FirstDepositModal({ onClose, onAddCash }) {
            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex flex-col items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <motion.div initial={{ scale: 0.8, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.8, y: 20 }} className="w-full max-w-sm flex flex-col items-center relative">
                        <div className="text-yellow-500 font-black text-3xl mb-2 drop-shadow-[0_2px_2px_rgba(0,0,0,1)] tracking-widest bg-gradient-to-b from-yellow-300 to-yellow-600 -webkit-background-clip-text text-transparent" style={{WebkitTextStroke: '1px #000'}}>
                            WELCOME BONUS
                        </div>
                        <div className="w-full bg-gradient-to-b from-[#3b4249] to-[#25282d] rounded-2xl border-[3px] border-gray-400 shadow-[0_10px_30px_rgba(0,0,0,0.8)] overflow-hidden flex flex-col p-6 text-center">
                            <h3 className="text-white font-bold text-lg mb-2">Get up to 8% extra on your first recharge!</h3>
                            <p className="text-gray-300 text-xs mb-6">Boost your balance immediately to play premium games like Aviator, WinGo, and Chicken Road.</p>
                            <SoundBtn onClick={onAddCash} className="w-full bg-gradient-to-b from-orange-400 to-orange-600 text-white font-black py-3.5 rounded-full shadow-gold border-2 border-white text-lg tracking-wider active:scale-95 transition-transform">
                                Go to Deposit
                            </SoundBtn>
                        </div>
                        <SoundBtn onClick={onClose} className="mt-6 w-12 h-12 rounded-full bg-black/60 border-[3px] border-gray-400 flex items-center justify-center text-gray-300 shadow-2xl active:scale-90">
                            <Icons.Close />
                        </SoundBtn>
                    </motion.div>
                </motion.div>
            );
        }

        /* ================= REGULAR TOP/BOTTOM & TABS ================= */
        function TopBar({ openModal, balance, handleDepositRedirect, indicators, setIndicators, unreadInboxCount }) {
            return (
                <div className="flex items-center justify-between p-3 bg-[#110E17] sticky top-0 z-30 border-b border-gray-800">
                    <div className="flex items-center gap-1 cursor-pointer" onClick={() => { playClick(); openModal('profile'); }}>
                        <div className="w-10 h-10 rounded-full border-2 border-brandRed overflow-hidden relative shadow-lg">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=e0e5ec" alt="Avatar" className="w-full h-full object-cover bg-white" />
                        </div>
                    </div>

                    <div className="flex items-center bg-cardLight border border-yellow-500/50 rounded-full py-1 px-3 shadow-gold flex-1 mx-3 relative h-10 cursor-pointer" onClick={() => { playClick(); handleDepositRedirect(); }}>
                        <div className="w-8 h-8 rounded-full bg-yellow-500 absolute -left-2 border-2 border-[#16131F] flex items-center justify-center text-black shadow"><Icons.Coin /></div>
                        <span className="text-white font-bold ml-6 text-base w-full text-center">{balance.toFixed(2)}</span>
                        <button className="w-8 h-8 rounded-full bg-gradient-to-b from-yellow-300 to-orange-500 absolute -right-2 border-2 border-[#16131F] flex items-center justify-center text-black font-black text-xl shadow-lg">+</button>
                    </div>

                    <div className="flex gap-2">
                        <div className="relative bg-brandBlue border border-blue-400 p-2 rounded-full cursor-pointer shadow-md" onClick={() => { playClick(); openModal('inbox'); }}>
                            <Icons.Mail />
                            {unreadInboxCount > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center border border-white">{unreadInboxCount}</span>}
                        </div>
                    </div>
                </div>
            );
        }

        function BottomNav({ currentTab, setCurrentTab }) {
            const tabs = [
                { id: 'bank', icon: <Icons.Bank />, label: 'Bank' },
                { id: 'wheel', icon: <Icons.Wheel />, label: 'Lucky Wheel' },
                { id: 'home', icon: <span className="text-2xl font-black text-white">777</span>, label: 'Games', isCenter: true },
                { id: 'refer', icon: <Icons.Refer />, label: 'Refer&Earn' },
                { id: 'bonus', icon: <Icons.Gift />, label: 'Bonus' },
            ];

            return (
                <div className="absolute bottom-0 w-full h-16 bg-[#110E17] border-t border-gray-800 flex justify-around items-center z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.8)]">
                    {tabs.map(tab => (
                        <button key={tab.id} onClick={() => { playClick(); setCurrentTab(tab.id); }} className={`flex-1 flex flex-col items-center justify-center relative ${tab.id === currentTab ? 'text-yellow-500' : 'text-gray-400'} w-1/5`}>
                            {tab.isCenter ? (
                                <div className={`absolute -top-8 w-16 h-16 rounded-full border-4 border-[#16131F] flex flex-col items-center justify-center shadow-gold transition-transform active:scale-95 ${tab.id===currentTab ? 'bg-gradient-to-b from-yellow-400 to-yellow-600' : 'bg-gradient-to-b from-gray-600 to-gray-800'}`}>
                                    <div className="bg-black/20 px-2 py-0.5 rounded-full font-black text-sm italic shadow-inner">777</div>
                                </div>
                            ) : (
                                <div className="mb-1 transition-transform active:scale-90">{tab.icon}</div>
                            )}
                            <span className={`text-[10px] font-bold mt-${tab.isCenter ? '6' : '0'}`}>{tab.label}</span>
                        </button>
                    ))}
                </div>
            );
        }

        /* ================= LOBBY VIEWS ================= */
        function HomeView({ openModal, primaryGames, secondaryGames }) {
            return (
                <div className="flex flex-col gap-5 px-4 pb-8 relative pt-2">
                    {/* Top 4 Premium Games */}
                    <div className="grid grid-cols-2 gap-4 mt-2">
                        {primaryGames.map((g) => (
                            <motion.div

        function WheelView({handleDepositRedirect, depositedAmount, showToast, updateFirebaseUser}) {
            const [spinning, setSpinning] = useState(false);
            const [rotation, setRotation] = useState(0);
            const canSpin = depositedAmount >= 200;

            const wheelPrizes = [10, 50, 100, 500, 1000, 5000, 10000, 50000];
            const weightedPool = [10, 10, 10, 10, 10, 10, 10, 10, 50, 50, 100]; 

            const handleSpin = () => {
                if(!canSpin) {
                    showToast("Deposit 200+ to Spin!");
                    return;
                }
                if(spinning) return;
                setSpinning(true);
                playSpinSound();
                
                const actualWin = weightedPool[Math.floor(Math.random() * weightedPool.length)];
                const targetIndex = wheelPrizes.indexOf(actualWin);
                
                const targetRotation = 360 - (targetIndex * 45);
                const extraSpins = 1800;
                const offset = Math.floor(Math.random() * 30) - 15;
                const totalRotation = rotation + extraSpins + targetRotation - (rotation % 360) + offset;
                
                setRotation(totalRotation);

                setTimeout(() => {
                    setSpinning(false);
                    showToast(`You won ₹${actualWin}!`);
                    
                    const userRef = database.ref('users/' + activePhone);
                    userRef.once('value').then((snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const currentBal = Number(data.balance || 0);
                            const currentDep = Number(data.depositedAmount || 0);
                            
                            const nextBal = parseFloat((currentBal + actualWin).toFixed(2));
                            const nextDep = parseFloat((currentDep - 200).toFixed(2));
                            
                            updateFirebaseUser({
                                balance: nextBal,
                                depositedAmount: nextDep
                            });
                        }
                    });
                }, 3000);
            };

            const sliceColors = ["#f87171", "#fb923c", "#facc15", "#4ade80", "#2dd4bf", "#60a5fa", "#a78bfa", "#f472b6"];

                    fee = 30;
                } else if (numAmt <= 1000) {
                    fee = 50;

            return (
                <div className="w-full h-full bg-appBg text-white flex flex-col absolute inset-0 z-50">

                        <input type="text" value={ifsc} onChange={e=>setIfsc(e.target.value)} placeholder="Please enter IFSC code" className="w-full bg-cardLight p-3 rounded-lg outline-none text-white border border-gray-600 focus:border-yellow-500" /></div>
                        
                        <SoundBtn onClick={()=>{
                            if(isValid) { playSuccess(); setSavedBank({ bName, name, acc, ifsc }); showToast("Bank Details Saved!"); }
                        }} className={`w-full font-bold py-3 rounded-xl shadow-md transition-colors ${isValid ? 'bg-gradient-to-b from-yellow-400 to-yellow-600 text-black shadow-gold' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                            Save Bank Info
                        </SoundBtn>
                    </div>
                </div>
            );
        }

        function AddUPIView({ showToast, savedUpi, setSavedUpi }) {
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [upi, setUpi] = useState("");
            const isValid = name && phone && upi;

            if (savedUpi) {
                return (
                    <div className="bg-cardBg p-4 rounded-xl border border-gray-700 shadow-md">
                        <div className="flex justify-between items-center mb-3">
                            <span className="text-sm text-yellow-500 font-bold">Saved UPI Info</span>
                            <SoundBtn onClick={() => setSavedUpi(null)} className="text-xs border border-gray-500 text-gray-300 rounded px-2 py-1">Edit</SoundBtn>
                        </div>
                        <div className="space-y-1 text-sm text-gray-200 font-bold text-xs">
                            <div><span className="text-gray-500 uppercase">Name:</span> {savedUpi.name}</div>
                            <div><span className="text-gray-500 uppercase">Phone:</span> {maskString(savedUpi.phone)}</div>
                            <div><span className="text-gray-500 uppercase">UPI ID:</span> {maskString(savedUpi.upi)}</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="bg-cardBg p-4 rounded-xl border border-gray-700 shadow-md space-y-4">
                        <div><label className="text-sm font-bold text-gray-200 mb-2 block">UPI Name</label>
                        <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Please enter UPI name" className="w-full bg-cardLight p-3 rounded-lg outline-none text-white border border-gray-600 focus:border-yellow-500" /></div>
                        <div><label className="text-sm font-bold text-gray-200 mb-2 block">Phone number</label>
                        <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Please enter the phone number" className="w-full bg-cardLight p-3 rounded-lg outline-none text-white border border-gray-600 focus:border-yellow-500" /></div>
                        <div><label className="text-sm font-bold text-gray-200 mb-2 block">UPI ID</label>
                        <input type="text" value={upi} onChange={e=>setUpi(e.target.value)} placeholder="Please enter your UPI ID" className="w-full bg-cardLight p-3 rounded-lg outline-none text-white border border-gray-600 focus:border-yellow-500" /></div>
                        
                        <SoundBtn onClick={()=>{
                            if(isValid) { playSuccess(); setSavedUpi({ name, phone, upi }); showToast("UPI Details Saved!"); }
                        }} className={`w-full font-bold py-3 rounded-xl shadow-md transition-colors ${isValid ? 'bg-gradient-to-b from-yellow-400 to-yellow-600 text-black shadow-gold' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                            Save UPI Info
                        </SoundBtn>
                    </div>
                </div>
            );
        }

        function HistoryView({ onBack, type, history }) {
            const rawData = type === 'deposit' ? history.deposits : history.withdrawals;
            const data = rawData || [];
            return (
                <div className="w-full h-full bg-appBg text-white flex flex-col absolute inset-0 z-50">
                    <div className="flex items-center p-4 bg-[#110E17] border-b border-gray-800 flex-shrink-0">
                        <SoundBtn onClick={onBack} className="mr-4 text-yellow-500"><Icons.Back /></SoundBtn>
                        <h2 className="text-lg font-semibold flex-1 capitalize">{type} History</h2>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-3 pb-20">
                        {data.length === 0 ? (
                            <div className="text-center text-gray-500 mt-10 font-bold tracking-wider">No {type} records found.</div>
                        ) : (
                            data.map(item => (
                                <div key={item.id} className="bg-cardLight p-4 rounded-xl border border-gray-700 flex justify-between items-center shadow-md">
                                    <div>
                                        <div className="text-yellow-500 font-bold text-lg mb-1">₹{item.amount.toFixed(2)}</div>
                                        {item.method && <div className="text-xs text-gray-300 font-bold uppercase tracking-wider mb-1">Method: {item.method}</div>}
                                        <div className="text-[10px] text-gray-400">{item.date}</div>
                                    </div>
                                    <div className={`text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider ${item.status === 'complete' || item.status === 'succeed' ? 'bg-green-500/20 text-green-500 border border-green-500/30' : item.status === 'processing' ? 'bg-yellow-500/20 text-yellow-500 border border-yellow-500/30' : 'bg-red-500/20 text-red-500 border border-red-500/30'}`}>
                                        {item.status}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<INRClubApp />);
    </script>
</body>
</html>
