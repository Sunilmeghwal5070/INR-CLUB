        }

        }

            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .toggle-label:after {
            content: '';

            left: 2px;
            width: 1.25rem;
            height: 1.25rem;

            border-radius: 50%;

            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, type, duration, vol) => {
            if (!window.soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

            Globe: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
            Help: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>,
            Star: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" /></svg>,
            Users: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" /></svg>,
            StarOutline: ({ className }) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" /></svg>
        };

        // Mask function to protect sensitive numbers
        const maskString = (str) => {
            if (!str) return "";
            if (str.length <= 3) return "***";
            return "*".repeat(str.length - 3) + str.slice(-3);
        };

        // --- Reusable Tips Modal matching game theme ---
        function TipsModal({ isOpen, message, onCancel, onConfirm, cancelText = "Cancel", confirmText = "Confirm" }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-xs bg-gradient-to-b from-gray-200 to-gray-400 rounded-2xl p-1 shadow-2xl relative">
                        <div className="bg-[#1E1C24] rounded-xl flex flex-col relative overflow-hidden h-full border border-gray-600">
                            <div className="text-center py-3 font-bold text-white bg-cardBg border-b border-gray-700 text-lg shadow-sm">
                                <Icons.Help className="inline-block w-5 h-5 mr-2" /> Tips
                            </div>
                            <div className="p-5 flex-1 bg-cardBg">
                                <div className="bg-cardLight rounded-xl p-6 text-center text-sm font-semibold text-gray-200 shadow-inner border border-gray-700 min-h-[100px] flex items-center justify-center">
                                    {message}
                                </div>
                            </div>
                            <div className="p-4 flex gap-4 justify-center bg-cardBg border-t border-gray-700">
                                {onCancel && (
                                    <SoundBtn onClick={onCancel} className="flex-1 bg-gradient-to-b from-red-500 to-red-700 text-white font-bold py-2.5 rounded-full border border-red-400 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.5),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 transition-transform text-sm">
                                        {cancelText}
                                    </SoundBtn>
                                )}
                                {onConfirm && (
                                    <SoundBtn onClick={onConfirm} className="flex-1 bg-gradient-to-b from-yellow-400 to-orange-500 text-black font-black py-2.5 rounded-full border border-yellow-200 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.5),0_4px_6px_rgba(0,0,0,0.3)] active:scale-95 transition-transform text-sm tracking-wide">
                                        {confirmText}
                                    </SoundBtn>
                                )}
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        }

        // --- VIP INFO MODAL ---
        function VIPInfoModal({ isOpen, onClose, vipLevel, vipLimit }) {
            if (!isOpen) return null;

            const vipData = {
                1: { level: 1, depositTarget: 30, wdLimit: 120, perks: ['Withdraw up to ₹120/day', 'Level up bonus ₹2', 'Weekly bonus ₹5', 'Monthly bonus ₹10'] },
                2: { level: 2, depositTarget: 100, wdLimit: 300, perks: ['Withdraw up to ₹300/day', 'Level up bonus ₹5', 'Weekly bonus ₹10', 'Monthly bonus ₹15'] },
                3: { level: 3, depositTarget: 300, wdLimit: 500, perks: ['Withdraw up to ₹500/day', 'Level up bonus ₹10', 'Weekly bonus ₹15', 'Monthly bonus ₹20'] },
                4: { level: 4, depositTarget: 500, wdLimit: 1500, perks: ['Withdraw up to ₹1500/day', 'Level up bonus ₹15', 'Weekly bonus ₹20', 'Monthly bonus ₹25'] }
            };

            const currentVip = vipData[vipLevel] || vipData[1];

            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md">
                    <motion.div initial={{ scale: 0.85, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.85, opacity: 0 }} className="w-full max-w-md bg-gradient-to-b from-[#1E1C24] to-[#110E17] rounded-3xl border border-yellow-500/30 shadow-2xl overflow-hidden relative">
                        <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-yellow-400 via-orange-500 to-yellow-400"></div>

                        <div className="p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-2xl font-casino text-yellow-400 font-black">
                                    <Icons.Crown className="inline-block w-7 h-7 mr-2 text-yellow-500" /> VIP {vipLevel} Details
                                </h3>
                                <SoundBtn onClick={onClose} className="w-9 h-9 rounded-full bg-red-600/20 border border-red-500/30 flex items-center justify-center text-red-400 hover:bg-red-600/40 transition-colors">
                                    <Icons.Close className="w-5 h-5" />
                                </SoundBtn>
                            </div>

                            <div className="space-y-4">
                                <div className="bg-cardLight/50 rounded-2xl p-4 border border-gray-700/50">
                                    <div className="flex justify-between items-center text-sm text-gray-300 mb-2">
                                        <span>Deposit Required</span>
                                        <span className="text-yellow-500 font-bold">₹{currentVip.depositTarget}</span>
                                    </div>
                                    <div className="h-2 bg-gray-700 rounded-full overflow-hidden">
                                        <div className="h-full bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full" style={{ width: '70%' }}></div>
                                    </div>
                                    <div className="text-xs text-gray-400 mt-2">Withdrawal Limit: <span className="text-green-400 font-bold">₹{currentVip.wdLimit}</span> per day</div>
                                </div>

                                <div className="bg-cardLight/30 rounded-2xl p-4 border border-gray-700/50">
                                    <div className="text-sm font-bold text-yellow-400 mb-3"><Icons.Star className="inline-block w-4 h-4 mr-1" /> VIP {vipLevel} Privileges</div>
                                    <div className="space-y-2">
                                        {currentVip.perks.map((perk, idx) => (
                                            <div key={idx} className="flex items-center gap-2 text-xs text-gray-300">
                                                <Icons.Check className="w-4 h-4 text-green-400 flex-shrink-0" />
                                                <span>{perk}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-yellow-500/10 rounded-2xl p-4 border border-yellow-500/20">
                                    <div className="text-xs text-gray-300 leading-relaxed">
                                        <span className="text-yellow-400 font-bold">How to use VIP:</span>
                                        <ul className="list-disc list-inside mt-2 space-y-1">
                                            <li>Deposit the required amount to unlock the next VIP level</li>
                                            <li>Higher VIP levels give higher withdrawal limits</li>
                                            <li>Weekly and Monthly bonuses are credited automatically</li>
                                            <li>Level Up bonus is credited immediately upon reaching new level</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="text-center text-xs text-gray-500 mt-2 border-t border-gray-700 pt-3">
                                    Current VIP Level: <span className="text-yellow-400 font-bold">{vipLevel}</span> &nbsp;|&nbsp; Max Withdraw/Day: <span className="text-green-400 font-bold">₹{currentVip.wdLimit}</span>
                                </div>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        }

        // --- Main App Component ---
        function INRClubApp() {
            const [phone, setPhone] = useState(localStorage.getItem('inr_club_active_phone') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('inr_club_active_phone'));
            const [currentTab, setCurrentTab] = useState('home');
            const [activePopup, setActivePopup] = useState(null);
            const [fullScreenPage, setFullScreenPage] = useState(null);
            const [showFirstDeposit, setShowFirstDeposit] = useState(false);

            const [balance, setBalance] = useState(58.44);
            const [depositedAmount, setDepositedAmount] = useState(0);
            const [history, setHistory] = useState({ deposits: [], withdrawals: [] });
            const [gamesList, setGamesList] = useState({});
            const [hasRedeemedCode, setHasRedeemedCode] = useState(false);

            const [wagerReq, setWagerReq] = useState(0);
            const [hasWithdrawn, setHasWithdrawn] = useState(false);

            // Persistent withdrawal details
            const [savedBank, setSavedBank] = useState(null);
            const [savedUpi, setSavedUpi] = useState(null);

            const [indicators, setIndicators] = useState({ sidebar: true });
            const [toast, setToast] = useState(null);
            const [showVipInfo, setShowVipInfo] = useState(false);

            const bgmRef = useRef(null);

            const [inboxMsgs, setInboxMsgs] = useState([
                { id: 1, type: 'notification', title: 'Daily Reward', content: 'Welcome Reward for joining INR CLUB!', amount: 10, date: new Date().toLocaleString(), claimed: false },
                { id: 2, type: 'notification', title: 'System Notice', content: 'Tap the image to join INR CLUB now — exclusive rewards, daily bonuses & special offers!', amount: 0, date: new Date().toLocaleString(), claimed: false }
            ]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2500);
            };

            // Heartbeat active timestamp update
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const heartbeatInterval = setInterval(() => {
                    database.ref(`users/${phone}`).update({ lastActive: Date.now() });
                }, 30000);
                return () => clearInterval(heartbeatInterval);
            }, [phone, isLoggedIn]);

            // Firebase sync
            useEffect(() => {
                if (!phone || !isLoggedIn) return;
                const userRef = database.ref('users/' + phone);
                const handleValue = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (data.blocked === true) {
                            alert("Your account has been blocked by the admin.");
                            handleLogout();
                            return;
                        }

                        if (typeof data.balance !== 'undefined') setBalance(Number(data.balance));
                        if (typeof data.depositedAmount !== 'undefined') setDepositedAmount(Number(data.depositedAmount));
                        if (typeof data.wagerReq !== 'undefined') setWagerReq(Number(data.wagerReq));
                        if (typeof data.hasRedeemedCode !== 'undefined') setHasRedeemedCode(!!data.hasRedeemedCode);
                        if (data.history) setHistory(data.history);
                        if (data.inboxMsgs) setInboxMsgs(data.inboxMsgs);

                        if (data.withdrawalDetails) {
                            if (data.withdrawalDetails.savedBank) setSavedBank(data.withdrawalDetails.savedBank);
                            if (data.withdrawalDetails.savedUpi) setSavedUpi(data.withdrawalDetails.savedUpi);
                        }
                    }
                };
                userRef.on('value', handleValue);
                return () => userRef.off('value', handleValue);
            }, [phone, isLoggedIn]);

            // Real-time games list listener
            useEffect(() => {
                const gamesRef = database.ref('games');
                gamesRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setGamesList(data);
                });
                return () => gamesRef.off();
            }, []);

            const updateFirebaseUser = (fields) => {
                if (!phone) return;
                database.ref('users/' + phone).update(fields);
            };

            // Dynamic Config Daily Reward claim ranges handler
            const handleClaimInbox = () => {
                database.ref('system_config').once('value').then(snapConfig => {
                    const config = snapConfig.val() || { minDailyBonus: 5, maxDailyBonus: 15 };
                    const minD = Number(config.minDailyBonus);
                    const maxD = Number(config.maxDailyBonus);

                    let claimedTotal = 0;
                    const newMsgs = inboxMsgs.map(m => {
                        if (!m.claimed && m.amount > 0) {
                            const dynamicReward = Math.floor(Math.random() * (maxD - minD + 1)) + minD;
                            claimedTotal += dynamicReward;
                            return { ...m, claimed: true, amount: dynamicReward };
                        }
                        return m;
                    });

                    if (claimedTotal > 0) {
                        const nextBal = parseFloat((balance + claimedTotal).toFixed(2));
                        updateFirebaseUser({
                            balance: nextBal,
                            inboxMsgs: newMsgs
                        });
                        showToast(`Claimed ₹${claimedTotal} successfully!`);
                    }
                });
            };

            // Dynamic Promo Code and Voucher Claiming Engine
            const handleClaimPromoCode = (inputCode) => {
                if (!inputCode) {
                    showToast("Please enter a promotion code.");
                    return;
                }
                const cleanCode = inputCode.trim().toUpperCase();
                const promoRef = database.ref(`promocodes/${cleanCode}`);

                promoRef.once('value').then(snapshot => {
                    const promo = snapshot.val();
                    if (!promo) {
                        alert("Invalid Promotion/Voucher Code!");
                        return;
                    }

                    const todayStr = new Date().toISOString().split('T')[0];
                    if (promo.expiryDate && todayStr > promo.expiryDate) {
                        alert("This promotion has expired!");
                        return;
                    }

                    if (promo.claimsCount >= promo.maxClaims) {
                        alert("This code's maximum claims limit has been reached!");
                        return;
                    }

                    if (promo.claims && promo.claims[phone]) {
                        alert("You have already claimed this promotion code!");
                        return;
                    }

                    const claimRecord = {
                        phone: phone,
                        timestamp: Date.now(),
                        coins: promo.coins
                    };

                    promoRef.child('claims').child(phone).set(claimRecord).then(() => {
                        const nextCount = (promo.claimsCount || 0) + 1;
                        promoRef.update({ claimsCount: nextCount });

                        const nextBal = parseFloat((balance + promo.coins).toFixed(2));
                        updateFirebaseUser({ balance: nextBal });

                        showToast(`Success! Claimed ₹${promo.coins} to your balance.`);
                    }).catch(err => alert("Claims verification error: " + err.message));

                }).catch(err => alert("Connection error: " + err.message));
            };

            const unreadInboxCount = inboxMsgs.filter(m => !m.claimed && m.amount > 0).length;

            useEffect(() => {
                if (isLoggedIn && window.musicEnabled && bgmRef.current) {
                    bgmRef.current.volume = 0.1;
                    bgmRef.current.play().catch(e => console.log("BGM Play prevented:", e));
                } else if (bgmRef.current) {
                    bgmRef.current.pause();
                }
            }, [isLoggedIn, currentTab, fullScreenPage]);

            const handleLogout = () => {
                localStorage.removeItem('inr_club_active_phone');
                setPhone("");
                setIsLoggedIn(false);
                setActivePopup(null);
                setFullScreenPage(null);
            };

            const handleRedirectToDeposit = () => {
                window.location.href = 'deposit.html';
            };

            const handleBackFromWithdraw = () => {
                setFullScreenPage(null);
            };

            const allGames = Object.values(gamesList);
            const primaryGames = allGames.filter(g => g.special).slice(0, 4);
            const secondaryGames = allGames.filter(g => !g.special);

            if (!isLoggedIn) {
                return <AuthView onLogin={(userPhone) => {
                    initAudio();
                    playSuccess();
                    setPhone(userPhone);
                    setIsLoggedIn(true);
                    setShowFirstDeposit(true);
                }} />;
            }

            // Calculate dynamic VIP Level based on depositedAmount
            const getUserVIPLevel = () => {
                if (depositedAmount >= 500) return 4;
                if (depositedAmount >= 300) return 3;
                if (depositedAmount >= 100) return 2;
                if (depositedAmount >= 30) return 1;
                return 0;
            };

            const userVIPLevel = getUserVIPLevel();

            // Maximum withdrawal limits based on VIP Level
            const getVIPWithdrawalLimit = (level) => {
                if (level === 1) return 120;
                if (level === 2) return 300;
                if (level === 3) return 500;
                if (level === 4) return 1500;
                return 0;
            };

            if (fullScreenPage === 'withdraw') {
                return (
                    <WithdrawView
                        onBack={handleBackFromWithdraw}
                        balance={balance}
                        showToast={showToast}
                        onShowHistory={() => setFullScreenPage('transactions')}
                        wagerReq={wagerReq}
                        hasWithdrawn={hasWithdrawn}
                        savedBank={savedBank}
                        setSavedBank={(bankData) => {
                            setSavedBank(bankData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedBank').set(bankData);
                        }}
                        savedUpi={savedUpi}
                        setSavedUpi={(upiData) => {
                            setSavedUpi(upiData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedUpi').set(upiData);
                        }}
                        vipLevel={userVIPLevel}
                        vipLimit={getVIPWithdrawalLimit(userVIPLevel)}
                        phone={phone}
                        onSuccess={(amt, method) => {
                            const finalAmt = parseFloat(amt.toFixed(2));
                            const nextBal = parseFloat((balance - finalAmt).toFixed(2));
                            const nextHist = {
                                ...history,
                                withdrawals: [{
                                    id: Date.now(),
                                    amount: finalAmt,
                                    method: method,
                                    status: 'processing',
                                    date: new Date().toLocaleString()
                                }, ...(history.withdrawals || [])]
                            };
                            updateFirebaseUser({
                                balance: nextBal,
                                history: nextHist
                            });
                            setHasWithdrawn(true);
                            setFullScreenPage('transactions');
                        }}
                    />
                );
            }

            if (fullScreenPage === 'transactions') {
                return <TransactionsView onBack={() => setFullScreenPage(null)} history={history} showToast={showToast} />;
            }

            if (fullScreenPage === 'manage_payments') {
                return (
                    <ManagePaymentsView
                        onBack={() => setFullScreenPage(null)}
                        savedBank={savedBank}
                        savedUpi={savedUpi}
                        setSavedBank={(bankData) => {
                            setSavedBank(bankData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedBank').set(bankData);
                        }}
                        setSavedUpi={(upiData) => {
                            setSavedUpi(upiData);
                            database.ref('users/' + phone + '/withdrawalDetails/savedUpi').set(upiData);
                        }}
                        showToast={showToast}
                    />
                );
            }

            if (currentTab === 'refer') {
                return <ReferView phone={phone} balance={balance} hasRedeemedCode={hasRedeemedCode} updateFirebaseUser={updateFirebaseUser} showToast={showToast} onClose={() => setCurrentTab('home')} />;
            }

            return (
                <div className="w-full h-full flex flex-col text-white relative">
                    <audio ref={bgmRef} loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

                    {/* TOAST NOTIFICATION */}
                    <AnimatePresence>
                        {toast && (
                            <motion.div initial={{ y: -50, opacity: 0 }} animate={{ y: 20, opacity: 1 }} exit={{ y: -50, opacity: 0 }} className="absolute top-0 left-0 right-0 z-[100] flex justify-center pointer-events-none">
                                <div className="bg-green-600 text-white px-6 py-2 rounded-full shadow-lg font-bold flex items-center gap-2 border border-green-400">
                                    <Icons.Check className="w-5 h-5" /> {toast}
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <TopBar openModal={setActivePopup} balance={balance} handleDepositRedirect={handleRedirectToDeposit} indicators={indicators} setIndicators={setIndicators} unreadInboxCount={unreadInboxCount} />

                    <div className="absolute top-[30%] right-0 z-40 bg-gradient-to-l from-[#EAB308] to-orange-500 pl-3 pr-1 py-4 rounded-l-2xl cursor-pointer shadow-gold animate-pulse-side border-y border-l border-white/20 flex items-center justify-center"
                    onClick={() => { playClick(); setIndicators(p => ({ ...p, sidebar: false }));
                        setActivePopup('side_menu'); }}>
                    <Icons.Menu className="w-6 h-6 text-black" />
                    {indicators.sidebar && <div className="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-[#16131F] shadow"></div>}
                </div>

                <div className="flex-1 overflow-y-auto pb-20 relative scroll-smooth bg-appBg w-full">
                    <AnimatePresence mode="wait">
                        <motion.div key={currentTab} initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 10 }} transition={{ duration: 0.2 }} className="min-h-full">
                            {currentTab === 'home' && <HomeView openModal={setActivePopup} primaryGames={primaryGames} secondaryGames={secondaryGames} />}
                            {currentTab === 'bank' && <BankView setFullScreenPage={setFullScreenPage} balance={balance} showToast={showToast} />}
                            {currentTab === 'wheel' && <WheelView handleDepositRedirect={handleRedirectToDeposit} depositedAmount={depositedAmount} showToast={showToast} updateFirebaseUser={updateFirebaseUser} />}
                            {currentTab === 'bonus' && <VIPView depositedAmount={depositedAmount} handleDepositRedirect={handleRedirectToDeposit} vipLevel={userVIPLevel} vipLimit={getVIPWithdrawalLimit(userVIPLevel)} openVipInfo={() => setShowVipInfo(true)} />}
                        </motion.div>
                    </AnimatePresence>
                </div>

                <BottomNav currentTab={currentTab} setCurrentTab={setCurrentTab} />

                <AnimatePresence>
                    {showFirstDeposit && <FirstDepositModal onClose={() => setShowFirstDeposit(false)} onAddCash={() => { setShowFirstDeposit(false);

        /* ================= NEW LIVE MY TRANSACTIONS SUBPAGE ================= */
        function TransactionsView({ onBack, history, showToast }) {
            const [activeTab, setActiveTab] = useState('deposits');
            const [statusFilter, setStatusFilter] = useState('all');
            const [timeFilter, setTimeFilter] = useState('all');

            useEffect(() => {
                setStatusFilter('all');
            }, [activeTab]);

            const getFilteredData = () => {
                let list = [];
                if (activeTab === 'deposits') {
                    list = history.deposits || [];
                } else if (activeTab === 'withdrawals') {
                    list = history.withdrawals || [];
                } else if (activeTab === 'balance') {
                    list = [...(history.deposits || []), ...(history.withdrawals || [])];
                } else {
                    list = [];
                }

                return list.filter(item => {
                    if (statusFilter !== 'all') {
                        if (statusFilter === 'succeed' && item.status !== 'complete' && item.status !== 'succeed') return false;
                        if (statusFilter === 'pending' && item.status !== 'processing' && item.status !== 'pending') return false;
                        if (statusFilter === 'failed' && item.status !== 'failed' && item.status !== 'fail') return false;
                        if (statusFilter === 'refund' && item.status !== 'refund') return false;
                        if (statusFilter === 'in' && !item.method) return false;
                    }

                    if (timeFilter !== 'all') {
                        const days = Number(timeFilter);
                        const limitMs = days * 24 * 60 * 60 * 1000;
                        const itemTime = item.id ? Number(item.id) : Date.now();
