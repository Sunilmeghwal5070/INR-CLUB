    // Web Audio Synthesizer Engine (Distinct High-Volume Audio Effects)
    class WebAudioSynth {
      constructor() {
        this.ctx = null;
        this.enabled = localStorage.getItem('wingo_sound_enabled') !== 'false';
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }
      toggle(state) {
        this.enabled = state;
        localStorage.setItem('wingo_sound_enabled', state ? 'true' : 'false');
      }
      playTick() {
        if (!this.enabled) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(950, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime); // High volume tick
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.08);
      }
      playClick() {
        if (!this.enabled) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(650, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime); // High volume click
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
      }
      playBeep() {
        if (!this.enabled) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(520, this.ctx.currentTime); 
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime); // Highly audible lockout warning beep
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.18);
      }
      playBetPlaced() {
        if (!this.enabled) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

      playPopupReveal() {
        if (!this.enabled) return;
        this.init();
        const now = this.ctx.currentTime;
        const note = (freq, start, duration) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.4, start);
          gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
          osc.start(start);
          osc.stop(start + duration);
        };
        note(587.33, now, 0.2); // D5
        note(880.00, now + 0.1, 0.35); // A5
      }
      playWin() {
        if (!this.enabled) return;
        this.init();
        const now = this.ctx.currentTime;

          const osc = this.ctx.createOscillator();

          gain.connect(this.ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.65, start); // Powerful win loudness
          gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
          osc.start(start);
          osc.stop(start + duration);
        };
        note(523.25, now, 0.2); // C5
        note(659.25, now + 0.1, 0.2); // E5
        note(783.99, now + 0.2, 0.2); // G5
        note(1046.50, now + 0.3, 0.5); // C6 Triumphant chord
      }
      playLose() {
        if (!this.enabled) return;
        this.init();
        const now = this.ctx.currentTime;
        const note = (freq, start, duration) => {
          const osc = this.ctx.createOscillator();

          gain.connect(this.ctx.destination);

          gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
          osc.start(start);
          osc.stop(start + duration);
        };
        note(349.23, now, 0.3); // F4
        note(277.18, now + 0.25, 0.6); // C#4 Gloomy finish
      }
    }

    const synth = new WebAudioSynth();

    // UTC-based unified period calculation matching admin panel
    const getFormattedPeriod = (mode, timeSecs) => {
      const interval = mode === '30s' ? 30 : mode === '1m' ? 60 : 180;
      const date = new Date(timeSecs * 1000);
      const yyyy = date.getUTCFullYear();
      const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(date.getUTCDate()).padStart(2, '0');
      const totalIntervals = Math.floor((date.getUTCHours() * 3600 + date.getUTCMinutes() * 60 + date.getUTCSeconds()) / interval);
      const modeCode = mode === '30s' ? '3' : mode === '1m' ? '1' : '2';
      return `${yyyy}${mm}${dd}1000${modeCode}${String(totalIntervals).padStart(5, '0')}`;
    };

    // Highly unpredictable, deterministic PRNG algorithm (Mulberry32) for auto-mode fallback
    const getDeterministicOutcome = (mode, period) => {
      let h = 2166136261;
      for (let i = 0; i < period.length; i++) {
        h = Math.imul(h ^ period.charCodeAt(i), 16777619);
      }
      h = h >>> 0;

      const random = () => {
        let t = h += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };

      const finalNumber = Math.floor(random() * 10);
      const size = finalNumber >= 5 ? 'Big' : 'Small';
      let colors = [];
      if (finalNumber === 0) colors = ['red', 'violet'];
      else if (finalNumber === 5) colors = ['green', 'violet'];
      else if (finalNumber % 2 === 0) colors = ['red'];
      else colors = ['green'];

      return { period, number: finalNumber, size, colors };
    };

    // Generate historical list dynamically to look seamless and matching
    const generateHistoricalSeed = (mode, count, offsetSeconds, currentSyncedSecs) => {
      const list = [];
      let pivotTime = currentSyncedSecs - offsetSeconds;
      const interval = mode === '30s' ? 30 : mode === '1m' ? 60 : 180;

      for (let i = 0; i < count; i++) {
        const checkTime = pivotTime - (i * interval);
        const periodStr = getFormattedPeriod(mode, checkTime);
        const outcome = getDeterministicOutcome(mode, periodStr);
        list.push({ ...outcome, timestamp: checkTime });
      }
      return list;
    };

    function App() {
      const [walletBalance, setWalletBalance] = useState(0);
      const walletBalanceRef = useRef(0);
      useEffect(() => {
          walletBalanceRef.current = walletBalance;

      const [activeMode, setActiveMode] = useState('1m'); 
      const [nowSeconds, setNowSeconds] = useState(Math.floor(Date.now() / 1000));
      const [serverTimeOffset, setServerTimeOffset] = useState(0);
      const serverTimeOffsetRef = useRef(0);

      const [history30s, setHistory30s] = useState([]);
      const [history1m, setHistory1m] = useState([]);
      const [history3m, setHistory3m] = useState([]);

      const [activeBets, setActiveBets] = useState([]);
      
      // Loaded from localStorage to support persistent 3-day history retention
      const [myHistory, setMyHistory] = useState([]);

      // Sound active state tracking
      const [soundEnabled, setSoundEnabled] = useState(synth.enabled);

      // Slide-out Menu options drawer
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isGuideOpen, setIsGuideOpen] = useState(false);

      const [toasts, setToasts] = useState([]);

      // Admin controllers in-sync with Firebase RTDB [11]
      const [adminMode1m, setAdminMode1m] = useState('auto');
      const [adminNextResult1m, setAdminNextResult1m] = useState(null);
      const [adminSchedule1m, setAdminSchedule1m] = useState({});

      const adminModeRef = useRef('auto');
      const adminNextResultRef = useRef(null);
      const adminScheduleRef = useRef({});

      // Global live user bets for calculating optimal minimum liability (Underdog win system)
      const [globalLiveBets, setGlobalLiveBets] = useState([]);

      useEffect(() => { adminModeRef.current = adminMode1m; }, [adminMode1m]);
      useEffect(() => { adminNextResultRef.current = adminNextResult1m; }, [adminNextResult1m]);
      useEffect(() => { adminScheduleRef.current = adminSchedule1m; }, [adminSchedule1m]);

      // Win / Loss Popup state
      const [resultModal, setResultModal] = useState({

        status: 'Succeed',
        bonus: 0,

      const [autoCloseModal, setAutoCloseModal] = useState(true);

      const [isRefreshing, setIsRefreshing] = useState(false);

      // Bets Setup
      const [betModalOpen, setBetModalOpen] = useState(false);

      const [baseAmount, setBaseAmount] = useState(1);

      const [activeTab, setActiveTab] = useState('Game history');

      // Pagination States
      const [gameHistPage, setGameHistPage] = useState(1);

      // Track last handled periods to prevent double-draw evaluations
      const lastEvaluatedPeriodRef = useRef({ '30s': '', '1m': '', '3m': '' });

      // Firebase Balance synchronization
      useEffect(() => {
          if (!activePhone) return;
          const userRef = database.ref('users/' + activePhone);

              const data = snapshot.val();
              if (data && typeof data.balance !== 'undefined') {
                  setWalletBalance(Number(data.balance));
              }
          };
          userRef.on('value', handleValue);
          return () => userRef.off('value', handleValue);

      const syncBalance = (newBalance) => {
          setWalletBalance(newBalance);
          if (activePhone) {
              database.ref('users/' + activePhone).update({ balance: parseFloat(newBalance.toFixed(2)) });
          }
      };

      // Listen to Global Server Time Offset
      useEffect(() => {
        const offsetRef = database.ref(".info/serverTimeOffset");
        const handleOffset = (snap) => {
          setServerTimeOffset(snap.val() || 0);
        };
        offsetRef.on("value", handleOffset);
        return () => offsetRef.off("value", handleOffset);
      }, []);

      // Realtime Firebase Admin configurations synchronization [11]
      useEffect(() => {
        const modeRef = database.ref("wingo_admin_mode_1m");
        const nextRef = database.ref("wingo_admin_next_result_1m");
        const schedRef = database.ref("wingo_admin_schedule_1m");

        modeRef.on("value", snap => setAdminMode1m(snap.val() || "auto"));
        nextRef.on("value", snap => setAdminNextResult1m(snap.val()));
        schedRef.on("value", snap => setAdminSchedule1m(snap.val() || {}));
        
        globalBetsRef.on("value", snap => {

            setGlobalLiveBets([]);

        });

        return () => {
          modeRef.off();
          nextRef.off();
          schedRef.off();
          globalBetsRef.off();
        };
      }, []);

      // Load 3-day filtered history from localStorage
      useEffect(() => {
        const storedHistory = localStorage.getItem(`wingo_my_history_${activePhone}`);
        if (storedHistory) {
          try {
            const parsed = JSON.parse(storedHistory);
            const threeDaysAgo = Date.now() - 3 * 24 * 60 * 60 * 1000;
            const valid = parsed.filter(item => {
              const itemTime = new Date(item.time).getTime();
              return itemTime >= threeDaysAgo;
            });
            setMyHistory(valid);
            localStorage.setItem(`wingo_my_history_${activePhone}`, JSON.stringify(valid));
          } catch (e) {
            setMyHistory([]);
          }
        }
      }, []);

      // Initialize histories and clock using synchronized server time
      useEffect(() => {
        const initialSecs = Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000);
        setHistory30s(generateHistoricalSeed('30s', 50, 30, initialSecs));
        setHistory1m(generateHistoricalSeed('1m', 50, 60, initialSecs));
        setHistory3m(generateHistoricalSeed('3m', 50, 180, initialSecs));

        lastEvaluatedPeriodRef.current = {
          '30s': getFormattedPeriod('30s', initialSecs),
          '1m': getFormattedPeriod('1m', initialSecs),
          '3m': getFormattedPeriod('3m', initialSecs)
        };

        const clockInterval = setInterval(() => {
          const syncedNow = Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000);
          setNowSeconds(syncedNow);
        }, 200);

        return () => clearInterval(clockInterval);
      }, [serverTimeOffset]);

      const addToast = (msg, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 2200);
      };

      // Sound alerts in the last 5 seconds of the countdown
      const activeTimeLeft = activeMode === '30s' 
        ? (30 - (nowSeconds % 30)) 
        : activeMode === '1m' 
          ? (60 - (nowSeconds % 60)) 
          : (180 - (nowSeconds % 180));

      useEffect(() => {
        if (activeTimeLeft <= 5 && activeTimeLeft > 0 && lastBeepTimeRef.current !== nowSeconds) {
          synth.playBeep();
          lastBeepTimeRef.current = nowSeconds;
        }
      }, [activeTimeLeft, nowSeconds]);

      // Handle block transitions precisely
      useEffect(() => {
        const processDrawEvaluation = (mode, interval, history, setHistory) => {
          const currentPeriod = getFormattedPeriod(mode, nowSeconds);
          const lastPeriod = lastEvaluatedPeriodRef.current[mode];

          if (lastPeriod && lastPeriod !== currentPeriod) {
            const outcome = determineNextOutcome(mode, lastPeriod);
            setHistory(prev => [outcome, ...prev].slice(0, 50));

            if (activeMode === mode) {
              evaluateCurrentBets(outcome);
            }
          }
          lastEvaluatedPeriodRef.current[mode] = currentPeriod;
        };

        if (history30s.length > 0) processDrawEvaluation('30s', 30, history30s, setHistory30s);
        if (history1m.length > 0) processDrawEvaluation('1m', 60, history1m, setHistory1m);
        if (history3m.length > 0) processDrawEvaluation('3m', 180, history3m, setHistory3m);

      }, [nowSeconds, activeMode, globalLiveBets]);

      // Underdog Win System (Dynamic Risk Minimization logic) across 30s, 1m, 3m
      const determineNextOutcome = (mode, targetPeriod) => {
        // 1. Check for Active Schedule Queue on Firebase [11]
        if (mode === '1m') {
          const sched = adminScheduleRef.current;
          if (sched && sched[targetPeriod]) {
            const scheduledItem = sched[targetPeriod];
            database.ref(`wingo_admin_schedule_1m/${targetPeriod}`).remove();
            return {
              period: targetPeriod,
              number: scheduledItem.number,
              size: scheduledItem.size,
              colors: scheduledItem.colors,
              timestamp: Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000)
            };
          }
        }

        // 2. Check for Immediate Force Override next result on Firebase [11]
        if (mode === '1m') {
          if (adminModeRef.current === 'manual' || adminNextResultRef.current) {
            const override = adminNextResultRef.current;
            if (override) {
              database.ref('wingo_admin_next_result_1m').remove();
              return {
                period: targetPeriod,
                number: override.number,
                size: override.size,
                colors: override.colors,
                timestamp: Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000)
              };
            }
          }
        }

        // 3. Underdog Win Logic (Run if admin has not set result)
        // Filter live bets specifically for this period
        const periodBets = globalLiveBets.filter(b => b.period === targetPeriod);
        if (periodBets.length > 0) {
          let lowestLiabilityNum = 0;
          let minPayoutAmount = Infinity;

          // Calculate potential payouts for each number from 0 to 9
          for (let candidateNum = 0; candidateNum <= 9; candidateNum++) {
            let simulatedPayout = 0;
            const size = candidateNum >= 5 ? 'Big' : 'Small';
            let colors = [];
            if (candidateNum === 0) colors = ['red', 'violet'];
            else if (candidateNum === 5) colors = ['green', 'violet'];
            else if (candidateNum % 2 === 0) colors = ['red'];
            else colors = ['green'];

            periodBets.forEach(bet => {
              const bValue = String(bet.value).toLowerCase();
              const bAmount = Number(bet.amount || 0);

              if (bValue === String(candidateNum)) {
                simulatedPayout += bAmount * 9; // Number matching
              } else if (bValue === size.toLowerCase()) {
                simulatedPayout += bAmount * 1.8; // Size matching
              } else if (colors.includes(bValue)) {
                if (bValue === 'violet' && (candidateNum === 0 || candidateNum === 5)) {
                  simulatedPayout += bAmount * 1.5;
                } else if ((bValue === 'red' || bValue === 'green') && (candidateNum === 0 || candidateNum === 5)) {
                  simulatedPayout += bAmount * 1.5;
                } else {
                  simulatedPayout += bAmount * 1.8;
                }
              }
            });

            if (simulatedPayout < minPayoutAmount) {
              minPayoutAmount = simulatedPayout;
              lowestLiabilityNum = candidateNum;
            } else if (simulatedPayout === minPayoutAmount) {
              // Tie-breaker: use deterministic hash to keep clients identical
              const checkOutcome = getDeterministicOutcome(mode, targetPeriod);
              if (checkOutcome.number === candidateNum) {
                lowestLiabilityNum = candidateNum;
              }
            }
          }

          const finalSize = lowestLiabilityNum >= 5 ? 'Big' : 'Small';
          let finalColors = [];
          if (lowestLiabilityNum === 0) finalColors = ['red', 'violet'];
          else if (lowestLiabilityNum === 5) finalColors = ['green', 'violet'];
          else if (lowestLiabilityNum % 2 === 0) finalColors = ['red'];
          else finalColors = ['green'];

          return {
            period: targetPeriod,
            number: lowestLiabilityNum,
            size: finalSize,
            colors: finalColors,
            timestamp: Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000)
          };
        }

        // 4. Default: Fallback on Deterministic, completely unpredictable Auto Mode Outcome
        const autoOutcome = getDeterministicOutcome(mode, targetPeriod);
        return {
          ...autoOutcome,
          timestamp: Math.floor((Date.now() + serverTimeOffsetRef.current) / 1000)
        };
      };

      const evaluateCurrentBets = (outcome) => {
        if (activeBets.length === 0) return;

        let totalReturn = 0;
        let logs = [];
        let totalPlaced = 0;

        activeBets.forEach(bet => {
          totalPlaced += bet.amount;
          let win = false;
          let multiplier = 0;

          if (bet.type === 'number') {
            if (parseInt(bet.value) === outcome.number) {
              win = true;
              multiplier = 9;
            }
          } else if (bet.type === 'size') {
            if (bet.value === outcome.size) {
              win = true;
              multiplier = 1.8;
            }
          } else if (bet.type === 'color') {
            const selectedColor = bet.value.toLowerCase();
            if (outcome.colors.includes(selectedColor)) {
              win = true;
              if (selectedColor === 'violet' || outcome.colors.includes('violet')) {
                multiplier = 1.5;
              } else {
                multiplier = 1.8;
              }
            }
          }

          const payout = win ? bet.amount * multiplier : 0;
          totalReturn += payout;

          logs.push({
            period: outcome.period,
            selection: bet.value,
            amount: bet.amount,
            status: win ? 'Succeed' : 'Failed',
            net: win ? payout - bet.amount : -bet.amount,
            time: new Date((Date.now() + serverTimeOffsetRef.current)).toISOString().replace('T', ' ').substring(0, 19)
          });
        });

        const isWinningRound = totalReturn > 0;
        
        synth.playPopupReveal();
        setResultModal({
          show: true,
          status: isWinningRound ? 'Succeed' : 'Failed',
          bonus: totalReturn,
          period: outcome.period,
          number: outcome.number,
          size: outcome.size,
          colors: outcome.colors
        });

            syncBalance(nextBal);

            addToast(`Win: +₹${totalReturn.toFixed(2)}`, 'success');

        const validHistory = nextHistory.filter(item => {

                            <td className="py-3 flex justify-end gap-1 items-center">
                              {item.colors.map((c, ci) => (
                                <span key={ci} className={`w-2.5 h-2.5 rounded-full inline-block shadow-inner ${c === 'red' ? 'bg-[#fd5656]' : c === 'green' ? 'bg-[#1fc770]' : 'bg-[#b351f9]'}`} />
                              ))}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Pagination Controls */}
                <div className="flex items-center justify-between mt-4 bg-gray-900/20 p-2 rounded-xl border border-gray-850">
                  <button 
                    disabled={gameHistPage === 1}
                    onClick={() => { synth.playClick(); setGameHistPage(p => Math.max(1, p - 1)); }}
                    className="px-3 py-1 bg-gray-850 text-xs rounded-lg border border-gray-800 text-white font-semibold disabled:opacity-40"
                  >
                    ❮ Prev
                  </button>
                  <span className="text-xs font-bold text-gray-400">Page {gameHistPage} of {totalPages}</span>
                  <button 
                    disabled={gameHistPage === totalPages}
                    onClick={() => { synth.playClick(); setGameHistPage(p => Math.min(totalPages, p + 1)); }}
                    className="px-3 py-1 bg-gray-850 text-xs rounded-lg border border-gray-800 text-white font-semibold disabled:opacity-40"
                  >
                    Next ❯
                  </button>
                </div>
              </div>
            )}

            {/* My Performance Logs (Unpreloaded, Filtered 3 Days Retention) */}
            {activeTab === 'My history' && (
              <div className="mt-3 space-y-2">

                {myHistory.length === 0 ? (
                  <div className="py-12 text-center text-gray-500 font-medium text-xs">
                    No betting logs found. Place your prediction to record data!
                  </div>
                ) : (
                  myHistory.map((bet, idx) => {
                    const isWin = bet.status === 'Succeed';
                    return (
                      <div key={idx} className="p-3 bg-[#222026] rounded-xl border border-gray-850 flex justify-between items-center text-xs">
                        <div>
                          <div className="text-[10px] text-gray-500 font-mono mb-1">{bet.period}</div>
                          <div className="font-bold flex items-center gap-1.5">
                            Selected: <span className="text-amber-400 uppercase font-black">{String(bet.selection)}</span>
                          </div>
                          <div className="text-[10px] text-gray-400 mt-1">
                            Bet Amount: <span className="text-white font-bold">₹{(bet.amount || 0).toFixed(2)}</span>
                          </div>
                          <div className="text-[9px] text-gray-500 mt-0.5">{bet.time}</div>
                        </div>
                        <div className="text-right">
                          <div className={`font-extrabold text-sm ${isWin ? 'text-green-400' : 'text-red-400'}`}>
                            {isWin ? `+₹${((bet.amount || 0) + bet.net).toFixed(2)}` : `-₹${Math.abs(bet.net).toFixed(2)}`}
                          </div>
                          <div className={`text-[10px] uppercase font-black mt-0.5 ${isWin ? 'text-green-500/70' : 'text-red-500/70'}`}>
                            {bet.status}
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            )}
          </div>

          {/* Confirm Bet Modal Drawer */}
          {betModalOpen && (
            <div className="fixed inset-0 bg-black/65 z-50 flex items-end justify-center">
              <div className="w-full max-w-md bg-[#222026] rounded-t-3xl border-t border-gray-800 p-5 shadow-2xl relative animate-slide-up">
                
                <div className="mb-5 text-center">
                  <div className="text-[10px] text-gray-400 tracking-widest uppercase">WinGo {activeMode === '30s' ? '30s' : activeMode === '1m' ? '1 Min' : '3 Min'}</div>
                  <div className={`mt-2 py-1.5 px-6 rounded-full inline-block font-black text-xs uppercase ${getSelectionHeaderBg()}`}>
                    Selected: {selectedBetValue}
                  </div>
                </div>

                {/* Base Amount Selector */}
                <div className="mb-4">
                  <div className="text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">Balance Selection</div>
                  <div className="grid grid-cols-4 gap-2.5">
                    {[1, 10, 100, 1000].map(val => (
                      <button
                        key={val}
                        onClick={() => { synth.playClick(); setBaseAmount(val); }}
                        className={`py-2 rounded-xl font-bold border transition-all text-sm ${
                          baseAmount === val ? 'bg-[#f2a93b] text-black border-[#f2a93b]' : 'bg-[#1c1a20] text-gray-400 border-gray-800'
                        }`}
                      >
                        {val}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Counter */}
                <div className="mb-4 flex justify-between items-center">
                  <span className="text-xs text-gray-400 font-bold uppercase tracking-wider">Quantity</span>
                  <div className="flex items-center gap-1.5 bg-[#1c1a20] border border-gray-850 rounded-xl p-1.5">
                    <button onClick={() => { synth.playClick(); setBetQuantity(q => Math.max(1, q - 1)); }} className="w-8 h-8 rounded-lg bg-gray-850 flex items-center justify-center font-bold text-lg">-</button>
                    <input type="number" value={betQuantity} onChange={e => setBetQuantity(Math.max(1, parseInt(e.target.value) || 1))} className="w-12 bg-transparent text-center font-bold text-sm focus:outline-none" />
                    <button onClick={() => { synth.playClick(); setBetQuantity(q => q + 1); }} className="w-8 h-8 rounded-lg bg-gray-850 flex items-center justify-center font-bold text-lg">+</button>
                  </div>
                </div>

                {/* Quick select presets */}
                <div className="mb-5 flex gap-2 overflow-x-auto no-scrollbar">
                  {[1, 5, 10, 20, 50, 100].map(mult => (
                    <button
                      key={mult}
                      onClick={() => { synth.playClick(); setBetQuantity(mult); }}
                      className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 ${
                        betQuantity === mult ? 'bg-amber-400 text-[#17151a] shadow-md' : 'bg-[#1c1a20] text-gray-400 border border-gray-800'
                      }`}
                    >
                      X{mult}
                    </button>
                  ))}
                </div>

                <label className="flex items-center gap-2 mb-5 cursor-pointer text-xs text-gray-400 select-none">
                  <input type="checkbox" checked={agreeTerms} onChange={e => setAgreeTerms(e.target.checked)} className="accent-amber-400 rounded-full w-4 h-4 bg-gray-900" />
                  <span>I agree <span className="text-amber-450 font-bold">《Pre-sale rules》</span></span>
                </label>

                {/* Confirm / Cancel Buttons */}
                <div className="flex gap-4">
                  <button onClick={() => { synth.playClick(); setBetModalOpen(false); }} className="flex-1 py-3.5 rounded-xl bg-gray-900 border border-gray-850 font-bold text-gray-300">Cancel</button>
                  <button 
                    disabled={!agreeTerms} 
                    onClick={executeBetPlacement} 
                    className={`flex-1 py-3.5 rounded-xl font-black text-white disabled:opacity-45 shadow-lg active:scale-95 transition-transform ${getBetButtonBgClass()}`}
                  >
                    Confirm ₹{(baseAmount * betQuantity).toFixed(2)}
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* Win / Loss Result Modals with Custom Visual Card URL structures */}
          {resultModal.show && (
            <div className="fixed inset-0 bg-black/85 z-50 flex flex-col items-center justify-center p-4">
              
              {/* Confetti Particle effects on Victory */}
              {resultModal.status === 'Succeed' && (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                  {[...Array(24)].map((_, i) => {
                    const randomColor = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#a855f7'][i % 5];
                    const leftPos = `${Math.random() * 100}%`;
                    const delay = `${Math.random() * 2}s`;
                    const size = `${Math.random() * 6 + 4}px`;
                    return (
                      <div 
                        key={i} 
                        className="confetti" 
                        style={{ 
                          backgroundColor: randomColor, 
                          left: leftPos, 
                          animationDelay: delay, 
                          width: size, 
                          height: size 
                        }} 
                      />
                    );
                  })}
                </div>
              )}

              {/* Popup Result Card Container with Win.png & Loss.png backdrops */}
              <div className="w-full max-w-xs flex flex-col items-center animate-popup-card">
                
                <div className={`w-full rounded-3xl p-5 text-center relative border shadow-2xl overflow-hidden bg-cover bg-center ${
                  resultModal.status === 'Succeed' 
                    ? 'border-amber-300/30 text-white' 
                    : 'border-sky-300/30 text-white'
                }`} style={{
                  backgroundImage: resultModal.status === 'Succeed' ? "url('Win.png')" : "url('loss.png')",
                  backgroundColor: resultModal.status === 'Succeed' ? '#4c1a06' : '#141e30'
                }}>
                  
                  {/* Overlay to ensure details are readable */}
                  <div className="absolute inset-0 bg-black/40 z-0"></div>

                  <div className="relative z-10">
                    {/* Badge */}
                    <div className="flex items-center justify-center mb-4">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center border-4 shadow-xl ${
                        resultModal.status === 'Succeed' ? 'bg-[#ff7b30] border-amber-400' : 'bg-[#5c84b3] border-sky-300'
                      }`}>
                        <svg className="w-8 h-8 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                      </div>
                    </div>

                    {/* Header Title */}
                    <div className="text-2xl font-black tracking-wider mb-4 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                      {resultModal.status === 'Succeed' ? 'Congratulations!' : 'Sorry'}
                    </div>

                    {/* Lottery outcomes */}
                    <div className="bg-black/60 rounded-xl p-3 mb-4 border border-white/10 flex flex-col items-center">
                      <span className="text-[10px] text-white/70 uppercase tracking-widest mb-1.5 font-bold">Lottery Result</span>
                      <div className="flex items-center gap-1.5">
                        <span className={`text-[9px] px-2 py-0.5 rounded-full font-black uppercase shadow ${
                          resultModal.colors.includes('green') ? 'bg-[#1fc770]' : 'bg-[#fd5656]'
                        }`}>
                          {resultModal.colors[0]}
                        </span>
                        {resultModal.colors.length > 1 && (
                          <span className="text-[9px] px-2 py-0.5 rounded-full font-black uppercase shadow bg-[#b351f9]">
                            Violet
                          </span>
                        )}
                        <span className="w-6 h-6 rounded-full bg-white/15 flex items-center justify-center font-black text-xs shadow text-white border border-white/10">
                          {resultModal.number}
                        </span>
                        <span className={`text-[9px] px-2 py-0.5 rounded-full font-black uppercase shadow ${
                          resultModal.size === 'Big' ? 'bg-[#f2a93b] text-black' : 'bg-[#4ba0e6]'
                        }`}>
                          {resultModal.size}
                        </span>
                      </div>
                    </div>

                    {/* Payout Details Container */}
                    <div className="bg-white rounded-2xl p-4 shadow-inner text-gray-850 flex flex-col items-center">
                      <span className="text-[10px] font-bold tracking-widest text-[#c24b23] uppercase mb-1">
                        {resultModal.status === 'Succeed' ? 'Bonus Won' : 'Net Outcome'}
                      </span>
                      <div className={`text-2xl font-black tracking-tight mb-2 ${
                        resultModal.status === 'Succeed' ? 'text-emerald-600' : 'text-rose-600'
                      }`}>
                        {resultModal.status === 'Succeed' ? `₹${resultModal.bonus.toFixed(2)}` : 'Lose'}
                      </div>
                      <span className="text-[10px] font-mono text-gray-500 leading-tight">
                        WinGo {activeMode === '30s' ? '30sec' : activeMode === '1m' ? '1 Min' : '3 Min'}
                      </span>
                      <span className="text-[9px] font-mono font-bold text-gray-400 mt-0.5">
                        {resultModal.period}
                      </span>
                    </div>

                    {/* Auto Close Toggle Display */}
                    <div className="flex items-center justify-center gap-2 mt-4 text-[10px] text-white/90 font-medium drop-shadow-md">
                      <label className="flex items-center gap-1.5 cursor-pointer">
                        <input 
                          type="checkbox" 
                          checked={autoCloseModal} 
                          onChange={(e) => setAutoCloseModal(e.target.checked)} 
                          className="accent-amber-450 rounded border-none w-3.5 h-3.5 bg-black/20"
                        />
                        <span>Enable 3s Auto-Close</span>
                      </label>
                    </div>

                  </div>

                </div>

                {/* Close Button */}
                <button 
                  onClick={() => setResultModal(prev => ({ ...prev, show: false }))}
                  className="mt-5 w-10 h-10 rounded-full bg-black/40 border border-white/20 flex items-center justify-center hover:bg-black/60 active:scale-90 transition-transform shadow-lg"
                >
                  <span className="text-white text-lg font-bold">✕</span>
                </button>

              </div>
            </div>
          )}

          {/* Slide-out Settings Options Drawer */}
          {isMenuOpen && (
            <div className="fixed inset-0 bg-black/75 z-50 flex items-end justify-center">
              <div className="w-full max-w-md bg-[#222026] rounded-t-3xl border-t border-gray-800 p-5 shadow-2xl relative">
                
                <div className="flex justify-between items-center mb-6">
                  <span className="text-sm font-black uppercase tracking-wider text-amber-400">Settings & Rules</span>
                  <button 
                    onClick={() => { synth.playClick(); setIsMenuOpen(false); }}
                    className="text-gray-400 hover:text-white text-lg font-bold"
                  >
                    ✕
                  </button>
                </div>

                <div className="space-y-4">
                  {/* Sound FX Switch Toggle */}
                  <div className="p-3.5 rounded-2xl bg-[#1c1a20] border border-gray-850 flex justify-between items-center">
                    <div>
                      <span className="text-xs font-bold block">Game Music & Sound FX</span>
                      <span className="text-[10px] text-gray-500">Loud synthesizer alerts</span>
                    </div>
                    <button 
                      onClick={toggleSound}
                      className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${
                        soundEnabled ? 'bg-amber-400 text-black' : 'bg-gray-900 text-gray-500 border border-gray-800'
                      }`}
                    >
                      {soundEnabled ? '🔊 ON' : '🔇 OFF'}
                    </button>
                  </div>

                  {/* How To Play Button */}
                  <button 
                    onClick={() => { synth.playClick(); setIsGuideOpen(true); }}
                    className="w-full p-3.5 rounded-2xl bg-[#1c1a20] border border-gray-850 flex justify-between items-center text-left text-xs font-bold hover:bg-[#2a2830]"
                  >
                    <span>📖 How To Play Game</span>
                    <span className="text-amber-400 text-base">❯</span>
                  </button>

                  {/* Exit Game Button */}
                  <button 
                    onClick={triggerExit}
                    className="w-full p-3.5 rounded-2xl bg-rose-950/20 border border-rose-900/30 flex justify-between items-center text-left text-xs font-black text-rose-400 hover:bg-rose-950/40"
                  >
                    <span>🚪 Exit Game Session</span>
                    <span>❯</span>
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* Guide Overlay Modal */}
          {isGuideOpen && (
            <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4">
              <div className="w-full max-w-xs bg-[#222026] rounded-3xl border border-gray-800 p-5 space-y-4 shadow-2xl">
                <div className="text-center">
                  <span className="text-base font-black text-amber-400 block uppercase tracking-wider">How to Play</span>
                  <div className="text-xs text-gray-400 leading-relaxed text-left mt-3.5 space-y-2.5 max-h-60 overflow-y-auto no-scrollbar">
                    <p>1. **Prediction Options**: Predict outcomes based on colors (Green, Red, Violet), sizes (Big, Small), or individual numbers from 0 to 9.</p>
                    <p>2. **Color Multipliers**: Green or Red pays **1.8x** value. Violet pays a massive **4.5x** value.</p>
                    <p>3. **Exact Numbers**: Predict the exact winning lottery digit correctly to take home a massive **9x** reward payout.</p>
                    <p>4. **Size Options**: Big (digits 5 to 9) and Small (digits 0 to 4) pay out a stable **1.8x** returns.</p>
                    <p>5. **Underdog Payout Guarantee**: If no admin result is locked, our server computes and selects the outcome containing the least overall risk stake to maximize house compliance [11].</p>
                  </div>
                </div>
                <button 
                  onClick={() => { synth.playClick(); setIsGuideOpen(false); }}
                  className="w-full py-2.5 rounded-xl bg-amber-400 text-black font-black text-xs"
                >
                  Got It
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
