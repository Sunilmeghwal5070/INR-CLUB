<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INR CLUB - Safe Deposit</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#16131F',
                        cardBg: '#211D2B',
                        cardLight: '#2A2536',
                        goldLight: '#FFF7B0',
                        goldMid: '#EAB308',
                        goldDark: '#B8860B'
                    },
                    backgroundImage: {
                        'green-card': 'linear-gradient(135deg, #4ADE80 0%, #06B6D4 100%)',
                    }
                }
            }
        }
    </script>
    <!-- React, ReactDOM, Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { margin: 0; background-color: #000; display: flex; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 430px; height: 100vh; height: 100dvh; position: relative; overflow: hidden; background: #16131F; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root" class="app-container"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCCd0sxHVTqBG3I6MhvP4mebxUS7EofkTo",
            authDomain: "inr-club-d4500.firebaseapp.com",
            databaseURL: "https://inr-club-d4500-default-rtdb.firebaseio.com",
            projectId: "inr-club-d4500",
            storageBucket: "inr-club-d4500.firebasestorage.app",
            messagingSenderId: "496374937195",
            appId: "1:496374937195:web:a0d7fc817e1b02fe23a32e"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const activePhone = localStorage.getItem('inr_club_active_phone');

        if (!activePhone) {
            window.location.href = 'home.html';
        }

        const Icons = {
            Back: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
            Refresh: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            Copy: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            SuccessCheck: () => <svg className="w-16 h-16 text-emerald-500 animate-bounce" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            History: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        };

        function DepositPortal() {
            const [view, setView] = useState("select"); // select, payment, waiting, history
            const [balance, setBalance] = useState(0);
            const [depositedAmount, setDepositedAmount] = useState(0);
            const [selAmt, setSelAmt] = useState("");
            const [selChannel, setSelChannel] = useState("upi1");
            const [utr, setUtr] = useState("");
            const [timeLeft, setTimeLeft] = useState(300);
            const [history, setHistory] = useState({ deposits: [], withdrawals: [] });
            const [copied, setCopied] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            
            // Tracking states for real-time payment validation
            const [pendingDepositId, setPendingDepositId] = useState(null);
            const [isApproved, setIsApproved] = useState(false);

            // Dynamic administrative configurations
            const [depositAmounts, setDepositAmounts] = useState([30, 100, 200, 300, 500, 1000, 2000, 3000, 5000]);
            const [depositBonuses, setDepositBonuses] = useState([0, 0, 2, 3, 4, 5, 6, 7, 8]);
            
            // Dynamic payment info fields from admin
            const [upiId, setUpiId] = useState("inrclub@upi");
            const [merchantName, setMerchantName] = useState("INR Club");
            const [qrUrl, setQrUrl] = useState("");

            // Reference to keep track of pending ID in the listener callback
            const pendingIdRef = useRef(null);
            useEffect(() => {
                pendingIdRef.current = pendingDepositId;
            }, [pendingDepositId]);

            useEffect(() => {
                const userRef = database.ref('users/' + activePhone);
                userRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (typeof data.balance !== 'undefined') setBalance(Number(data.balance));
                        if (typeof data.depositedAmount !== 'undefined') setDepositedAmount(Number(data.depositedAmount));
                        
                        if (data.history) {
                            setHistory(data.history);
                            
                            // Real-time verification check
                            const currentPendingId = pendingIdRef.current;
                            if (currentPendingId) {
                                const depositsList = data.history.deposits;
                                let depositArray = [];
                                if (depositsList) {
                                    depositArray = typeof depositsList === 'object' ? Object.values(depositsList) : depositsList;
                                }
                                
                                const matchedDep = depositArray.find(d => d.id === currentPendingId);
                                if (matchedDep) {
                                    const currentStatus = (matchedDep.status || '').toLowerCase();
                                    if (currentStatus === 'completed' || currentStatus === 'success' || currentStatus === 'complete') {
                                        setIsApproved(true);
                                        setPendingDepositId(null);
                                        // Auto redirect back to home page after success display
                                        setTimeout(() => {
                                            window.location.href = "home.html";
                                        }, 3500);
                                    } else if (currentStatus === 'failed' || currentStatus === 'declined' || currentStatus === 'rejected') {
                                        alert("Deposit failed: " + (matchedDep.reason || "Verification rejected by Admin."));
                                        setPendingDepositId(null);
                                        setView("select");
                                    }
                                }
                            }
                        }
                    }
                });

                // Sync configs dynamically from Firebase
                database.ref('system_config').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (data.depositAmounts) {
                            setDepositAmounts(data.depositAmounts.split(',').map(Number));
                        }
                        if (data.depositBonuses) {
                            setDepositBonuses(data.depositBonuses.split(',').map(Number));
                        }
                        if (data.upiId) setUpiId(data.upiId);
                        if (data.merchantName) setMerchantName(data.merchantName);
                        if (data.qrUrl) setQrUrl(data.qrUrl);
                        else setQrUrl("");
                    }
                });

                return () => {
                    userRef.off();
                    database.ref('system_config').off();
                };
            }, []);

            useEffect(() => {
                if (view !== "payment" || timeLeft <= 0) return;
                const timerId = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timerId);
            }, [view, timeLeft]);

            const handleGoBack = () => {
                if (view === "payment" || view === "waiting" || view === "history") {
                    setView("select");
                } else {
                    window.location.href = "home.html";
                }
            };

            const triggerProceed = () => {
                if (!selAmt) return;
                setTimeLeft(300);
                setUtr("");
                setView("payment");
            };

            const handleCopyUpi = () => {
                navigator.clipboard.writeText(upiId).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }).catch(() => {
                    alert("Failed to copy UPI ID.");
                });
            };

            // Manual Balance Refresh Trigger
            const handleRefreshBalance = () => {
                setIsRefreshing(true);
                database.ref('users/' + activePhone + '/balance').once('value')
                    .then((snapshot) => {
                        const latestBal = snapshot.val();
                        if (latestBal !== null) {
                            setBalance(Number(latestBal));
                        }
                        setTimeout(() => setIsRefreshing(false), 800);
                    })
                    .catch(() => {
                        setIsRefreshing(false);
                    });
            };

            // Global UPI payment handler - This will display ALL available UPI apps on mobile device
            const handleRedirect = () => {
                const encodedUpiId = encodeURIComponent(upiId);
                const encodedName = encodeURIComponent(merchantName);
                // Standard UPI schema that forces operating system app chooser
                const url = `upi://pay?pa=${encodedUpiId}&pn=${encodedName}&am=${selAmt}`;
                window.location.href = url;
            };

            const handleUTRSubmit = () => {
                if (utr.length !== 12) {
                    alert("Please enter a valid 12-digit UTR/Ref number.");
                    return;
                }
                const cleanAmount = Number(selAmt);
                const depId = Date.now();

                // Standardizing current deposits list parsing for Firebase safety
                let currentDeposits = [];
                if (history && history.deposits) {
                    currentDeposits = typeof history.deposits === 'object' ? Object.values(history.deposits) : history.deposits;
                }

                // Add to deposit history with 'processing' state
                const nextHist = {
                    ...history,
                    deposits: [{ 
                        id: depId, 
                        amount: parseFloat(cleanAmount.toFixed(2)), 
                        status: 'processing', 
                        date: new Date().toLocaleString(),
                        utr: utr,
                        reason: ""
                    }, ...currentDeposits]
                };

                database.ref('users/' + activePhone).update({
                    history: nextHist
                }).then(() => {
                    setPendingDepositId(depId);
                    setView("waiting"); // Switch to real-time verification screen
                }).catch(err => alert("Error updating database: " + err.message));
            };

            const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const secs = String(timeLeft % 60).padStart(2, '0');

            const methods = [
                { id: 'upi1', label: 'UPI-QR', extra: '+1%' },
                { id: 'upi2', label: 'Innate UPI-QR', extra: '+1%' },
                { id: 'upi3', label: 'UPI-QR PAY', extra: '+1%' },
                { id: 'paytm', label: 'PAYTM', extra: '+1%' }
            ];

            // Generating standard UPI payment URI dynamically based on selected amount (Strictly limited parameters)
            const dynamicUpiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(merchantName)}&am=${selAmt}`;
            const generatedQrCode = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(dynamicUpiUri)}`;

            // Extracting deposit array for rendering history
            let depositArray = [];
            if (history && history.deposits) {
                depositArray = typeof history.deposits === 'object' ? Object.values(history.deposits) : history.deposits;
            }
            // Sort history by date/ID descending (Newest first)
            depositArray.sort((a, b) => (b.id || 0) - (a.id || 0));

            return (
                <div className="w-full h-full flex flex-col text-white">
                    <div className="flex items-center p-4 bg-[#110E17] border-b border-gray-800 flex-shrink-0">
                        {view !== "waiting" && (
                            <button onClick={handleGoBack} className="mr-4 text-yellow-500"><Icons.Back /></button>
                        )}
                        <h2 className="text-lg font-semibold flex-1">
                            {view === "select" ? "Recharge Lobby" : 
                             view === "payment" ? "Scan to Pay" : 
                             view === "waiting" ? "Auditing Payment" : "Recharge History"}
                        </h2>
                        {view === "select" && (
                            <button 
                                onClick={() => setView("history")} 
                                className="text-yellow-500 hover:text-yellow-400 flex items-center gap-1.5 text-xs font-bold bg-[#211D2B] px-3 py-1.5 rounded-lg border border-gray-800"
                            >
                                <Icons.History />
                                History
                            </button>
                        )}
                    </div>

                    {view === "select" && (
                        <div className="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
                            <div className="bg-green-card rounded-xl p-5 shadow-lg relative overflow-hidden flex items-center justify-between">
                                <div>
                                    <div className="text-green-900 text-sm font-bold mb-1">🪙 Current Wallet Balance</div>
                                    <div className="text-3xl font-black text-black">₹{balance.toFixed(2)}</div>
                                </div>
                                <button 
                                    onClick={handleRefreshBalance}
                                    disabled={isRefreshing}
                                    className="text-black/80 hover:text-black p-2 rounded-full bg-white/20 hover:bg-white/30 active:scale-95 transition-all flex items-center justify-center border border-white/10 shrink-0"
                                    title="Refresh Balance"
                                >
                                    <span className={isRefreshing ? "animate-spin" : ""}>
                                        <Icons.Refresh />
                                    </span>
                                </button>
                            </div>

                            <div className="grid grid-cols-4 gap-2">
                                {methods.map(m => (
                                    <div key={m.id} onClick={() => setSelChannel(m.id)} 
                                         className={`rounded-lg p-2 flex flex-col items-center justify-center relative cursor-pointer border-2 ${selChannel === m.id ? 'bg-yellow-500/20 border-yellow-500' : 'bg-cardBg border-gray-750'}`}>
                                        <span className="text-[9px] text-center font-bold text-yellow-500">{m.label}</span>
                                    </div>
                                ))}
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-3">Recharge Amount</label>
                                <div className="grid grid-cols-3 gap-3">
                                    {depositAmounts.map((a, idx) => {
                                        const pct = depositBonuses[idx] || 0;
                                        return (
                                            <button key={idx} onClick={() => setSelAmt(a)} className={`py-3 rounded-lg border font-bold text-sm transition-colors relative ${selAmt === a ? 'bg-yellow-500/20 border-yellow-500 text-yellow-500 font-black' : 'bg-cardLight border-gray-700'}`}>
                                                ₹ {a}
                                                {pct > 0 && <span className="absolute -top-2.5 -right-1 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded shadow">+{pct}%</span>}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="pt-4 border-t border-gray-800 flex items-center justify-between">
                                <span className="text-xs text-gray-400">Selected Method: {methods.find(m=>m.id===selChannel)?.label}</span>
                                <button onClick={triggerProceed} disabled={!selAmt} className={`px-8 py-3 rounded-xl font-bold ${selAmt ? 'bg-yellow-500 text-black font-black' : 'bg-gray-700 text-gray-500'}`}>
                                    Recharge
                                </button>
                            </div>
                        </div>
                    )}

                    {view === "payment" && (
                        <div className="flex-1 overflow-y-auto p-4 space-y-5 pb-24">
                            <div className="bg-cardBg rounded-xl p-4 flex justify-between items-center border border-gray-750">
                                <span className="text-2xl font-black text-white">₹{selAmt}</span>
                                <span className="text-red-500 font-bold text-lg font-mono">{mins}:{secs}</span>
                            </div>

                            <div className="bg-cardLight rounded-xl p-5 flex flex-col items-center text-center border border-gray-800">
                                {/* QR Code Display (Clean Scan URL only) */}
                                <div className="bg-white p-2 rounded-xl mb-4 w-44 h-44 shadow-lg flex items-center justify-center overflow-hidden">
                                    <img 
                                        src={qrUrl ? qrUrl : generatedQrCode} 
                                        alt="Deposit QR Code" 
                                        className="w-full h-full object-contain"
                                    />
                                </div>
                                
                                <p className="text-xs text-gray-300 leading-relaxed mb-4">
                                    Scan QR code using Paytm, PhonePe, Google Pay, or any UPI App to pay.
                                </p>

                                {/* Dynamic UPI ID Display with Copy Button */}
                                <div className="w-full bg-[#1c1924] border border-gray-700 rounded-lg p-2.5 flex items-center justify-between text-left mb-4">
                                    <div className="overflow-hidden mr-2">
                                        <span className="text-[10px] text-gray-400 block font-semibold uppercase">UPI ID</span>
                                        <span className="text-sm font-semibold text-yellow-500 font-mono truncate block select-all">{upiId}</span>
                                    </div>
                                    <button 
                                        onClick={handleCopyUpi} 
                                        className="bg-yellow-500 text-black px-3 py-1.5 rounded-lg font-bold text-xs hover:bg-yellow-400 flex items-center gap-1 shrink-0"
                                    >
                                        <Icons.Copy />
                                        {copied ? "Copied" : "Copy"}
                                    </button>
                                </div>

                                {/* Direct Pay Redirection Buttons - Dynamically opening OS Application Chooser */}
                                <div className="w-full border-t border-gray-850 pt-4 space-y-2">
                                    <p className="text-[11px] text-yellow-500/90 font-bold mb-2">🚀 Instant Mobile App Pay (No scan required):</p>
                                    <div className="grid grid-cols-2 gap-3 w-full">
                                        <button 
                                            onClick={handleRedirect} 
                                            className="py-3 bg-gradient-to-r from-purple-600 to-indigo-800 text-white font-extrabold text-xs rounded-xl flex items-center justify-center gap-1.5 shadow-md active:scale-95 transition-all"
                                        >
                                            🟣 PhonePe
                                        </button>
                                        <button 
                                            onClick={handleRedirect} 
                                            className="py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-extrabold text-xs rounded-xl flex items-center justify-center gap-1.5 shadow-md active:scale-95 transition-all"
                                        >
                                            🔵 Paytm
                                        </button>
                                    </div>
                                    <button 
                                        onClick={handleRedirect} 
                                        className="w-full py-2.5 bg-gradient-to-r from-yellow-500 to-amber-600 text-black font-black text-xs rounded-xl flex items-center justify-center gap-2 shadow-md active:scale-95 transition-all"
                                    >
                                        📲 Pay using other UPI Apps (GPay, BHIM, etc)
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-gray-400 mb-2 block">UTR Number / Ref. No.</label>
                                <div className="bg-cardLight rounded-xl p-2 flex items-center border border-gray-700 focus-within:border-yellow-500">
                                    <input type="text" maxLength="12" value={utr} onChange={e => setUtr(e.target.value.replace(/\D/g, ''))} placeholder="Enter 12 digits UTR" className="bg-transparent flex-1 outline-none px-2 text-white font-mono tracking-widest" />
                                    <button onClick={() => navigator.clipboard.readText().then(t => setUtr(t.replace(/\D/g, '').slice(0, 12)))} className="bg-yellow-500 text-black px-4 py-1.5 rounded-lg font-bold text-xs hover:bg-yellow-400">Paste</button>
                                </div>
                            </div>

                            <button onClick={handleUTRSubmit} className="w-full py-4 bg-gradient-to-b from-yellow-400 to-yellow-600 text-black font-black rounded-xl shadow-lg mt-4 uppercase">
                                Submit UTR
                            </button>
                        </div>
                    )}

                    {view === "waiting" && (
                        <div className="flex-1 flex flex-col items-center justify-center p-6 space-y-6 text-center animate-fadeIn">
                            {!isApproved ? (
                                <div className="space-y-6">
                                    {/* Real-time Checking Pulse Animation */}
                                    <div className="relative flex items-center justify-center w-24 h-24 mx-auto">
                                        <div className="absolute inset-0 rounded-full bg-yellow-500/20 animate-ping"></div>
                                        <div className="absolute inset-2 rounded-full bg-yellow-500/40 animate-pulse"></div>
                                        <div className="relative w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center shadow-lg">
                                            <svg className="w-6 h-6 text-black animate-spin" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                            </svg>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <h3 className="text-xl font-bold text-yellow-500">Verifying Your Deposit</h3>
                                        <p className="text-xs text-gray-400 max-w-sm leading-relaxed">
                                            We are auditing your 12-digit UTR <b>{utr}</b> for the amount of <b>₹{selAmt}</b>.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-cardLight p-4 rounded-xl border border-gray-800 text-[11px] text-gray-400 max-w-xs mx-auto">
                                        ⏳ Do not refresh, close or press back button. Your balance will update automatically as soon as the Admin approves the transaction.
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4 animate-scaleUp">
                                    <div className="flex items-center justify-center">
                                        <Icons.SuccessCheck />
                                    </div>
                                    <h3 className="text-2xl font-black text-emerald-400">Payment Approved!</h3>
                                    <p className="text-sm text-gray-300">
                                        ₹{selAmt} has been credited to your account.
                                    </p>
                                    <div className="text-[11px] text-gray-500 mt-2">
                                        Redirecting back to dashboard...
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {view === "history" && (
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
                            {depositArray.length === 0 ? (
                                <div className="text-center py-12 text-gray-500 text-sm">
                                    No transaction records found.
                                </div>
                            ) : (
                                depositArray.map((dep, idx) => {
                                    const rawStatus = (dep.status || 'processing').toLowerCase();
                                    let statusColorClass = "text-yellow-500 bg-yellow-500/10 border-yellow-500/30";
                                    let displayStatus = "Processing";

                                    if (rawStatus === 'completed' || rawStatus === 'success' || rawStatus === 'complete') {
                                        statusColorClass = "text-emerald-500 bg-emerald-500/10 border-emerald-500/30";
                                        displayStatus = "Completed";
                                    } else if (rawStatus === 'failed' || rawStatus === 'declined' || rawStatus === 'rejected') {
                                        statusColorClass = "text-rose-500 bg-rose-500/10 border-rose-500/30";
                                        displayStatus = "Failed";
                                    }

                                    return (
                                        <div key={dep.id || idx} className="bg-cardBg border border-gray-800 rounded-xl p-4 space-y-3 shadow-md">
                                            <div className="flex justify-between items-center">
                                                <span className="text-lg font-black text-white">₹{dep.amount}</span>
                                                <span className={`text-[11px] font-extrabold px-2.5 py-1 rounded-full border ${statusColorClass}`}>
                                                    {displayStatus}
                                                </span>
                                            </div>
                                            <div className="text-xs text-gray-400 space-y-1.5 pt-1">
                                                <div className="flex justify-between">
                                                    <span>UTR No:</span>
                                                    <span className="font-mono text-gray-300 font-semibold select-all">{dep.utr || 'N/A'}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span>Date:</span>
                                                    <span className="text-gray-300">{dep.date || 'N/A'}</span>
                                                </div>
                                                {dep.reason && (
                                                    <div className="mt-2.5 pt-2 border-t border-gray-800/80 text-rose-400">
                                                        <span className="font-bold text-[10px] block uppercase tracking-wider mb-0.5 text-rose-500/80">Rejection Reason:</span>
                                                        <span className="text-[11px] leading-relaxed block text-rose-300/90">{dep.reason}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DepositPortal />);
    </script>
</body>
</html>
